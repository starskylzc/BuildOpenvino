name: Verify Built Artifacts (C# 端到端测试)

# 目的:
#   下载 ORT native + OpenCvSharp native,运行 test.png 端到端推理验证 (画框 + ORT 推理双 lib 在同一 C# 进程)。
#
#   ORT native 来源分两种:
#     - self-build (5 个): win-x64-dml / win-x86-cpu / win-arm64-dml / mac-x64-coreml / mac-arm64-coreml
#       从 BuildOpenvino 仓库 "Build ORT 1.25.0 Desktop" workflow CI artifact 拉。
#       Win 因 1.25 没出 NuGet,Mac 因官方 deploy_target 太新 (osx-arm64 14.0,osx-x64 完全没),
#       必须自 build。
#     - official (2 个): linux-x64-gpu(CUDA12+TRT) / linux-aarch64
#       从 microsoft/onnxruntime v1.25.0 GitHub release tgz 拉。
#       glibc 2.27 floor (比我们 manylinux_2_28 还宽,信创全适配)。
#       linux-x64 用 GPU 包 (含 CUDA + TensorRT),CPU EP 在 runner 上验证 (no GPU on GHA),
#       但 CUDA/TRT plugin .so 也会被 stage 进 deploy/,客户机有 NVIDIA driver 即可启用。

on:
  workflow_dispatch:
    inputs:
      ort_run_id:
        description: 'Self-build ORT run ID (留空则按 artifact 名找最近成功)'
        required: false
        type: string
      opencv_run_id:
        description: 'OpenCvSharp Build run ID (留空则用 main 最近成功)'
        required: false
        type: string
      target_set:
        description: 'Which platforms to verify'
        required: true
        default: 'all'
        type: choice
        options:
          # ── 单平台档 ──
          - win-x64-dml
          - win-x86-cpu
          - win-arm64-dml
          - mac-x64-coreml
          - mac-arm64-coreml
          - linux-x64
          - linux-aarch64
          # ── 聚合档 ──
          - all
          - self-build-only      # 5 个 self-build (Win + Mac)
          - official-only        # 2 个官方 Linux

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ORT_VERSION: "1.25.0"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # 7 个 target — 5 self-build + 2 official Linux
          # source:           "self-build" 从 CI artifact 拉,"official" 从 GitHub release 拉
          # rid:              .NET RID (publish 用)
          # publish_self_contained: 是否 self-contained publish (win-x86 必须,host 是 x64)
          # ort_artifact:     self-build CI artifact 名 (source=self-build 时用)
          # ort_official_url: 官方 release URL (source=official 时用)
          # ort_lib:          主 onnxruntime 库文件名
          # ort_extra:        附加 .so/.dll 列表 (空格分隔),staging 时一并 copy
          # ocv_artifact:     OpenCvSharp CI artifact 名
          # ocv_lib:          OpenCvSharp 主库文件名
          # ort_extra 列各平台真正需要的附加 native lib (空格分隔):
          #   Win DML:    DirectML.dll (DML 是 plugin 形式 dlopen)
          #   Win x86:    啥都不要,纯 CPU EP
          #   Mac CoreML: 啥都不要,CoreML EP 静态链接进主库
          #   Linux x64-gpu: providers_shared + cuda + tensorrt (GPU plugin pattern)
          #   Linux aarch64: providers_shared (即使 CPU only 也保留,ORT 启动时会 lazy load)
          # 注:onnxruntime_providers_shared.dll/so 在 Win/Mac DML/CoreML 不需要 (上次 verify 全 ✅ 证实),
          # Linux 保留是因为 Linux GPU EP 是真 plugin pattern。
          WIN_X64='{"name":"win-x64-dml","runner":"windows-2022","rid":"win-x64","publish_self_contained":false,"source":"self-build","ort_artifact":"onnxruntime-1.25.0-win-x64-dml","ort_lib":"onnxruntime.dll","ort_extra":"DirectML.dll","ocv_artifact":"win-x64","ocv_lib":"OpenCvSharpExtern.dll"}'
          WIN_X86='{"name":"win-x86-cpu","runner":"windows-2022","rid":"win-x86","publish_self_contained":true,"source":"self-build","ort_artifact":"onnxruntime-1.25.0-win-x86-cpu","ort_lib":"onnxruntime.dll","ort_extra":"","ocv_artifact":"win-x86","ocv_lib":"OpenCvSharpExtern.dll"}'
          WIN_ARM64='{"name":"win-arm64-dml","runner":"windows-11-arm","rid":"win-arm64","publish_self_contained":false,"source":"self-build","ort_artifact":"onnxruntime-1.25.0-win-arm64-dml","ort_lib":"onnxruntime.dll","ort_extra":"DirectML.dll","ocv_artifact":"win-arm64","ocv_lib":"OpenCvSharpExtern.dll"}'
          MAC_X64='{"name":"mac-x64-coreml","runner":"macos-15-intel","rid":"osx-x64","publish_self_contained":false,"source":"self-build","ort_artifact":"onnxruntime-1.25.0-osx-x64-coreml","ort_lib":"libonnxruntime.dylib","ort_extra":"","ocv_artifact":"osx-x64-slice","ocv_lib":"libOpenCvSharpExtern.dylib"}'
          MAC_ARM64='{"name":"mac-arm64-coreml","runner":"macos-14","rid":"osx-arm64","publish_self_contained":false,"source":"self-build","ort_artifact":"onnxruntime-1.25.0-osx-arm64-coreml","ort_lib":"libonnxruntime.dylib","ort_extra":"","ocv_artifact":"osx-arm64-slice","ocv_lib":"libOpenCvSharpExtern.dylib"}'

          # 官方 Linux:
          # - linux-x64 用 GPU 包 (CPU EP 内置 + CUDA12 + TensorRT plugin),客户机有 NVIDIA driver 自动启用 GPU
          # - linux-aarch64 只有 CPU 包 (官方没出 ARM GPU 版,行业现实 ARM+GPU 极少)
          LINUX_X64='{"name":"linux-x64","runner":"ubuntu-24.04","rid":"linux-x64","publish_self_contained":false,"source":"official","ort_official_url":"https://github.com/microsoft/onnxruntime/releases/download/v1.25.0/onnxruntime-linux-x64-gpu-1.25.0.tgz","ort_official_dir":"onnxruntime-linux-x64-gpu-1.25.0","ort_lib":"libonnxruntime.so","ort_extra":"libonnxruntime_providers_shared.so libonnxruntime_providers_cuda.so libonnxruntime_providers_tensorrt.so","ocv_artifact":"linux-x86_64","ocv_lib":"libOpenCvSharpExtern.so"}'
          LINUX_AARCH64='{"name":"linux-aarch64","runner":"ubuntu-24.04-arm","rid":"linux-arm64","publish_self_contained":false,"source":"official","ort_official_url":"https://github.com/microsoft/onnxruntime/releases/download/v1.25.0/onnxruntime-linux-aarch64-1.25.0.tgz","ort_official_dir":"onnxruntime-linux-aarch64-1.25.0","ort_lib":"libonnxruntime.so","ort_extra":"libonnxruntime_providers_shared.so","ocv_artifact":"linux-aarch64","ocv_lib":"libOpenCvSharpExtern.so"}'

          case "${{ inputs.target_set }}" in
            win-x64-dml)        echo "matrix={\"include\":[$WIN_X64]}" >> $GITHUB_OUTPUT ;;
            win-x86-cpu)        echo "matrix={\"include\":[$WIN_X86]}" >> $GITHUB_OUTPUT ;;
            win-arm64-dml)      echo "matrix={\"include\":[$WIN_ARM64]}" >> $GITHUB_OUTPUT ;;
            mac-x64-coreml)     echo "matrix={\"include\":[$MAC_X64]}" >> $GITHUB_OUTPUT ;;
            mac-arm64-coreml)   echo "matrix={\"include\":[$MAC_ARM64]}" >> $GITHUB_OUTPUT ;;
            linux-x64)          echo "matrix={\"include\":[$LINUX_X64]}" >> $GITHUB_OUTPUT ;;
            linux-aarch64)      echo "matrix={\"include\":[$LINUX_AARCH64]}" >> $GITHUB_OUTPUT ;;
            self-build-only)
              echo "matrix={\"include\":[$WIN_X64,$WIN_X86,$WIN_ARM64,$MAC_X64,$MAC_ARM64]}" >> $GITHUB_OUTPUT ;;
            official-only)
              echo "matrix={\"include\":[$LINUX_X64,$LINUX_AARCH64]}" >> $GITHUB_OUTPUT ;;
            *)
              echo "matrix={\"include\":[$WIN_X64,$WIN_X86,$WIN_ARM64,$MAC_X64,$MAC_ARM64,$LINUX_X64,$LINUX_AARCH64]}" >> $GITHUB_OUTPUT ;;
          esac

  verify:
    name: ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python (PNG↔BGR 转换 — OpenCvSharp 精简版没编 imgcodecs)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Pillow
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Pillow>=10.4"

      # ── ORT artifact 来源分支 ──
      - name: Resolve ORT run ID (self-build only)
        if: matrix.source == 'self-build'
        id: ort_run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.ort_run_id }}" ]; then
            echo "id=${{ inputs.ort_run_id }}" >> $GITHUB_OUTPUT
          else
            ARTIFACT_NAME="${{ matrix.ort_artifact }}"
            FOUND=""
            for ID in $(gh run list -R ${{ github.repository }} \
                --workflow="Build ORT 1.25.0 Desktop (Win + Mac, GPU/iGPU/CPU)" \
                --status=success --branch=main --limit=30 \
                --json databaseId --jq '.[].databaseId'); do
              if gh api "repos/${{ github.repository }}/actions/runs/$ID/artifacts" \
                  --jq '.artifacts[].name' 2>/dev/null | grep -qFx "$ARTIFACT_NAME"; then
                FOUND=$ID; break
              fi
            done
            if [ -z "$FOUND" ]; then
              echo "::error::No success ORT run with artifact '$ARTIFACT_NAME' found"
              exit 1
            fi
            echo "id=$FOUND" >> $GITHUB_OUTPUT
          fi

      - name: Download ORT (self-build) from CI artifact
        if: matrix.source == 'self-build'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p downloads/ort
          gh run download ${{ steps.ort_run.outputs.id }} -R ${{ github.repository }} \
            -n "${{ matrix.ort_artifact }}" -D downloads/ort
          echo ">>> ORT artifact contents:"
          ls -la downloads/ort

      - name: Download ORT (official) from GitHub release
        if: matrix.source == 'official'
        shell: bash
        run: |
          mkdir -p downloads/ort
          curl -sSL -o /tmp/ort-official.tgz "${{ matrix.ort_official_url }}"
          tar xzf /tmp/ort-official.tgz -C /tmp
          SRC=/tmp/${{ matrix.ort_official_dir }}/lib
          # 1. 主库:只取 libonnxruntime.so.1.25.0 (是 real file),改名 libonnxruntime.so
          #    丢掉原 tgz 里的 libonnxruntime.so / libonnxruntime.so.1 symlink (重复内容)
          if [ -f "$SRC/libonnxruntime.so.1.25.0" ]; then
            cp "$SRC/libonnxruntime.so.1.25.0" downloads/ort/libonnxruntime.so
          fi
          # 2. EP plugin (libonnxruntime_providers_*.so) — real files,直接 cp
          cp "$SRC"/libonnxruntime_providers_*.so downloads/ort/ 2>/dev/null || true
          echo ">>> ORT official contents (单一 libonnxruntime.so + plugins):"
          ls -la downloads/ort

      - name: Resolve OpenCvSharp run ID
        id: ocv_run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.opencv_run_id }}" ]; then
            echo "id=${{ inputs.opencv_run_id }}" >> $GITHUB_OUTPUT
          else
            ARTIFACT_NAME="${{ matrix.ocv_artifact }}"
            FOUND=""
            for ID in $(gh run list -R ${{ github.repository }} \
                --workflow="Build-Opencvsharp-AllPlatforms-4.10.0" \
                --status=success --branch=main --limit=10 \
                --json databaseId --jq '.[].databaseId'); do
              if gh api "repos/${{ github.repository }}/actions/runs/$ID/artifacts" \
                  --jq '.artifacts[].name' 2>/dev/null | grep -qFx "$ARTIFACT_NAME"; then
                FOUND=$ID; break
              fi
            done
            if [ -z "$FOUND" ]; then
              echo "::error::No success OpenCvSharp run with artifact '$ARTIFACT_NAME' found"
              exit 1
            fi
            echo "id=$FOUND" >> $GITHUB_OUTPUT
          fi

      - name: Download OpenCvSharp artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p downloads/ocv
          gh run download ${{ steps.ocv_run.outputs.id }} -R ${{ github.repository }} \
            -n "${{ matrix.ocv_artifact }}" -D downloads/ocv
          echo ">>> OpenCvSharp artifact contents:"
          ls -la downloads/ocv

      - name: Publish C# verify project
        shell: bash
        run: |
          cd tests/CSharpVerify
          if [ "${{ matrix.publish_self_contained }}" = "true" ]; then
            dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -o publish -v minimal
          else
            dotnet publish -c Release -r ${{ matrix.rid }} --self-contained false -o publish -v minimal
          fi
          ls -la publish/

      - name: Stage native libs (clean deploy + publish for verify)
        shell: bash
        run: |
          PUB=tests/CSharpVerify/publish
          STAGED=tests/CSharpVerify/staged
          mkdir -p "$STAGED"

          stage_to() {
            local dir=$1
            # ORT 主库 (单一文件,无版本号)
            cp "downloads/ort/${{ matrix.ort_lib }}" "$dir/"
            # 附加 native (DirectML.dll / providers_shared / cuda / tensorrt)
            for extra in ${{ matrix.ort_extra }}; do
              if [ -f "downloads/ort/$extra" ]; then
                cp "downloads/ort/$extra" "$dir/"
              else
                echo "::warning::matrix.ort_extra='$extra' 不在 downloads/ort/,跳过"
              fi
            done
            # OpenCvSharp 主库
            cp "downloads/ocv/${{ matrix.ocv_lib }}" "$dir/"
          }
          stage_to "$PUB"
          stage_to "$STAGED"

          echo ">>> staged/ (deploy artifact 内容):"
          ls -la "$STAGED"

      - name: Generate test.bgr from test.png
        shell: bash
        run: |
          cd tests
          python png_to_bgr.py
          ls -la test.bgr

      - name: Run C# verify (test.png → BGR → ORT 推理 + OpenCvSharp 画框 → annotated.bgr)
        shell: bash
        run: |
          cd tests/CSharpVerify
          MODEL=$(realpath ../merged_no_topk_fp16.onnx)
          BGR=$(realpath ../test.bgr)
          OUT="$(pwd)/annotated-${{ matrix.name }}.bgr"

          EXE_NAME="CSharpVerify"
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXE_NAME="CSharpVerify.exe"
          fi
          chmod +x "publish/$EXE_NAME" 2>/dev/null || true

          # 注:不设 DYLD_LIBRARY_PATH/LD_LIBRARY_PATH/PATH —
          # Program.cs 用 NativeLibrary.SetDllImportResolver 强制从 AppContext.BaseDirectory 加载。
          # 这跟客户 production 部署等价 (客户机不会装这些 env var)。
          # 如果加载失败说明 resolver 没起效,真实 bug 浮现。

          "./publish/$EXE_NAME" "$MODEL" "$BGR" "$OUT"
          ls -la "$OUT"

      - name: Convert annotated.bgr → annotated.png
        if: always()
        shell: bash
        run: |
          cd tests/CSharpVerify
          BGR="annotated-${{ matrix.name }}.bgr"
          PNG="annotated-${{ matrix.name }}.png"
          if [ -f "$BGR" ]; then
            python ../bgr_to_png.py "$BGR" "$PNG"
            ls -la "$PNG"
          fi

      - name: Upload annotated PNG
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: annotated-${{ matrix.name }}
          path: tests/CSharpVerify/annotated-${{ matrix.name }}.png
          retention-days: 14
          if-no-files-found: warn

      - name: Upload verified deploy artifact (单平台,供 stage job 汇总)
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: deploy-${{ matrix.name }}
          path: tests/CSharpVerify/staged/*
          retention-days: 14
          if-no-files-found: error

  # ── Stage:全 7 平台 verify ✅ 后,汇总成单个 deploy/ artifact ──
  # 客户用 ./artifacts/download_deploy.sh 一键拉这个 artifact 即得完整 deploy/<7 平台>/
  stage:
    name: stage-deploy
    needs: verify
    runs-on: ubuntu-latest
    # 仅在 verify 全 7 ✅ 后才跑 (任意 fail 都会 skip 这个 job,不会 ship 部分通过的产物)
    if: success()
    steps:
      - uses: actions/checkout@v6

      - name: Download all 7 deploy-<platform> artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p staging
          for plat in win-x64-dml win-x86-cpu win-arm64-dml mac-x64-coreml mac-arm64-coreml linux-x64 linux-aarch64; do
            echo ">>> Pulling deploy-$plat"
            gh run download ${{ github.run_id }} -R ${{ github.repository }} \
              -n "deploy-$plat" -D "staging/$plat"
            ls -la "staging/$plat" | head -10
          done

      - name: Assemble deploy/ tree (rename to clean platform names)
        shell: bash
        run: |
          mkdir -p deploy
          mv staging/win-x64-dml       deploy/win-x64
          mv staging/win-x86-cpu       deploy/win-x86
          mv staging/win-arm64-dml     deploy/win-arm64
          mv staging/mac-x64-coreml    deploy/osx-x64
          mv staging/mac-arm64-coreml  deploy/osx-arm64
          mv staging/linux-x64         deploy/linux-x64
          mv staging/linux-aarch64     deploy/linux-aarch64
          echo ">>> 完整 deploy/ tree:"
          find deploy -type f | sort
          echo ""
          du -sh deploy/*

      - name: Generate deploy/README.md (客户部署说明)
        shell: bash
        run: |
          cat > deploy/README.md <<'EOF'
          # Native Runtime Bundle (ORT 1.25.0 + OpenCvSharp 4.10.0)

          7 个平台,选对应你客户机 OS 的 SKU 直接 ship 整个目录即可。

          | 平台目录 | 客户机 OS | 加速 |
          |---|---|---|
          | `win-x64/` | Windows 10/11 x64 | DirectML 自动 (NVIDIA/AMD/Intel iGPU) |
          | `win-x86/` | Windows 10/11 32-bit | CPU only |
          | `win-arm64/` | Windows 11 ARM64 | DirectML |
          | `osx-x64/` | macOS 10.15+ Intel | CoreML |
          | `osx-arm64/` | macOS 11.0+ Apple Silicon | CoreML + ANE |
          | `linux-x64/` | Linux x86_64 (glibc 2.27+) | CPU / CUDA12 / TensorRT |
          | `linux-aarch64/` | Linux ARM64 (glibc 2.27+) | CPU only |

          客户端 C# 代码用 `NativeLibrary.SetDllImportResolver` 强制从 app 目录加载
          (参考 `tests/CSharpVerify/Program.cs`)。

          信创 OS 兼容: 麒麟 V10 / UOS V20 / openEuler / RHEL 8+ (glibc 2.27 floor)。
          EOF

      - name: Upload final deploy bundle
        uses: actions/upload-artifact@v7
        with:
          name: deploy-1.25.0-${{ github.sha }}
          path: deploy/
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        shell: bash
        run: |
          echo "## ✅ 全 7 平台 verified + staged 完成" >> $GITHUB_STEP_SUMMARY
          echo "本地下载:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cd artifacts/ && ./download_deploy.sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
