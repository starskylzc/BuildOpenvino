name: Verify Built Artifacts (C# 端到端测试)

# 目的:
#   下载我们自己 build 的 ORT (Build ORT 1.25.0 Desktop) + OpenCvSharp (Build-Opencvsharp-AllPlatforms-4.10.0)
#   native artifacts,放到 C# 测试程序的 bin 目录,跑端到端推理验证。
#
#   这是真正的 "build 验证" — 证明我们生成的 native lib 在每个平台上能正常加载、
#   跟 OpenCvSharp 一起读图,通过 ORT.Managed 推理融合模型,输出符合预期。
#
# 与 "Verify Fused Model.yml" 的区别:
#   - 那个是 PyPI onnxruntime + opencv-python (验证模型 + ORT 1.25 通用兼容性)
#   - 这个是我们自己 build 的 native (验证 BuildOpenvino 仓库 CI 产物)

on:
  workflow_dispatch:
    inputs:
      ort_run_id:
        description: 'ORT Build run ID (留空则用 main 最近成功)'
        required: false
        type: string
      opencv_run_id:
        description: 'OpenCvSharp Build run ID (留空则用 main 最近成功)'
        required: false
        type: string
      target_set:
        description: 'Which platforms to verify (推荐:每次只跑一个,跟 ORT build 名对齐)'
        required: true
        default: 'all'
        type: choice
        options:
          # ── 单平台档 (跟 ORT build target_set 完全对齐) ──
          - win-x64-dml
          - win-x86-cpu
          - win-arm64-dml
          - mac-x64-coreml
          - mac-arm64-coreml
          - linux-x64-cuda
          - linux-x64-rocm
          - linux-x64-openvino
          - linux-x64-cpu
          - linux-arm64-cpu
          # ── 聚合档 ──
          - all
          - windows-only
          - macos-only
          - linux-only

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # 全 10 平台:跟 ORT build target_set 完全对齐
          # rid:        .NET RID,用于 publish
          # publish_self_contained: 是否 self-contained publish (win-x86 需要,因为
          #             windows-2022 runner 是 x64 host,默认没装 x86 .NET runtime)
          # gpu_ep:     仅 Linux GPU 档为 true,这种 build 的 ORT 含 GPU plugin 但
          #             CI runner 没 GPU,我们用 CPU EP 兜底验证 lib 加载 + CPU 推理
          WIN_X64='{"name":"win-x64-dml","runner":"windows-2022","rid":"win-x64","publish_self_contained":false,"gpu_ep":false,"ort_artifact":"onnxruntime-1.25.0-win-x64-dml","ort_lib":"onnxruntime.dll","ort_extra":"DirectML.dll","ocv_artifact":"win-x64","ocv_lib":"OpenCvSharpExtern.dll"}'
          WIN_X86='{"name":"win-x86-cpu","runner":"windows-2022","rid":"win-x86","publish_self_contained":true,"gpu_ep":false,"ort_artifact":"onnxruntime-1.25.0-win-x86-cpu","ort_lib":"onnxruntime.dll","ort_extra":"","ocv_artifact":"win-x86","ocv_lib":"OpenCvSharpExtern.dll"}'
          WIN_ARM64='{"name":"win-arm64-dml","runner":"windows-11-arm","rid":"win-arm64","publish_self_contained":false,"gpu_ep":false,"ort_artifact":"onnxruntime-1.25.0-win-arm64-dml","ort_lib":"onnxruntime.dll","ort_extra":"DirectML.dll","ocv_artifact":"win-arm64","ocv_lib":"OpenCvSharpExtern.dll"}'
          MAC_X64='{"name":"mac-x64-coreml","runner":"macos-15-intel","rid":"osx-x64","publish_self_contained":false,"gpu_ep":false,"ort_artifact":"onnxruntime-1.25.0-osx-x64-coreml","ort_lib":"libonnxruntime.dylib","ort_extra":"libonnxruntime_providers_coreml.dylib","ocv_artifact":"osx-x64-slice","ocv_lib":"libOpenCvSharpExtern.dylib"}'
          MAC_ARM64='{"name":"mac-arm64-coreml","runner":"macos-14","rid":"osx-arm64","publish_self_contained":false,"gpu_ep":false,"ort_artifact":"onnxruntime-1.25.0-osx-arm64-coreml","ort_lib":"libonnxruntime.dylib","ort_extra":"libonnxruntime_providers_coreml.dylib","ocv_artifact":"osx-arm64-slice","ocv_lib":"libOpenCvSharpExtern.dylib"}'
          LINUX_X64_CPU='{"name":"linux-x64-cpu","runner":"ubuntu-24.04","rid":"linux-x64","publish_self_contained":false,"gpu_ep":false,"ort_artifact":"onnxruntime-1.25.0-linux-x64-cpu","ort_lib":"libonnxruntime.so","ort_extra":"","ocv_artifact":"linux-x86_64","ocv_lib":"libOpenCvSharpExtern.so"}'
          LINUX_ARM64_CPU='{"name":"linux-arm64-cpu","runner":"ubuntu-24.04-arm","rid":"linux-arm64","publish_self_contained":false,"gpu_ep":false,"ort_artifact":"onnxruntime-1.25.0-linux-arm64-cpu","ort_lib":"libonnxruntime.so","ort_extra":"","ocv_artifact":"linux-aarch64","ocv_lib":"libOpenCvSharpExtern.so"}'
          LINUX_X64_CUDA='{"name":"linux-x64-cuda","runner":"ubuntu-24.04","rid":"linux-x64","publish_self_contained":false,"gpu_ep":true,"ort_artifact":"onnxruntime-1.25.0-linux-x64-cuda","ort_lib":"libonnxruntime.so","ort_extra":"","ocv_artifact":"linux-x86_64","ocv_lib":"libOpenCvSharpExtern.so"}'
          LINUX_X64_ROCM='{"name":"linux-x64-rocm","runner":"ubuntu-24.04","rid":"linux-x64","publish_self_contained":false,"gpu_ep":true,"ort_artifact":"onnxruntime-1.25.0-linux-x64-rocm","ort_lib":"libonnxruntime.so","ort_extra":"","ocv_artifact":"linux-x86_64","ocv_lib":"libOpenCvSharpExtern.so"}'
          LINUX_X64_OPENVINO='{"name":"linux-x64-openvino","runner":"ubuntu-24.04","rid":"linux-x64","publish_self_contained":false,"gpu_ep":true,"ort_artifact":"onnxruntime-1.25.0-linux-x64-openvino","ort_lib":"libonnxruntime.so","ort_extra":"","ocv_artifact":"linux-x86_64","ocv_lib":"libOpenCvSharpExtern.so"}'

          case "${{ inputs.target_set }}" in
            # ── 单平台档 (跟 ORT build target_set 对齐) ──
            win-x64-dml)        echo "matrix={\"include\":[$WIN_X64]}" >> $GITHUB_OUTPUT ;;
            win-x86-cpu)        echo "matrix={\"include\":[$WIN_X86]}" >> $GITHUB_OUTPUT ;;
            win-arm64-dml)      echo "matrix={\"include\":[$WIN_ARM64]}" >> $GITHUB_OUTPUT ;;
            mac-x64-coreml)     echo "matrix={\"include\":[$MAC_X64]}" >> $GITHUB_OUTPUT ;;
            mac-arm64-coreml)   echo "matrix={\"include\":[$MAC_ARM64]}" >> $GITHUB_OUTPUT ;;
            linux-x64-cuda)     echo "matrix={\"include\":[$LINUX_X64_CUDA]}" >> $GITHUB_OUTPUT ;;
            linux-x64-rocm)     echo "matrix={\"include\":[$LINUX_X64_ROCM]}" >> $GITHUB_OUTPUT ;;
            linux-x64-openvino) echo "matrix={\"include\":[$LINUX_X64_OPENVINO]}" >> $GITHUB_OUTPUT ;;
            linux-x64-cpu)      echo "matrix={\"include\":[$LINUX_X64_CPU]}" >> $GITHUB_OUTPUT ;;
            linux-arm64-cpu)    echo "matrix={\"include\":[$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
            # ── 聚合档 ──
            windows-only)
              echo "matrix={\"include\":[$WIN_X64,$WIN_X86,$WIN_ARM64]}" >> $GITHUB_OUTPUT ;;
            macos-only)
              echo "matrix={\"include\":[$MAC_X64,$MAC_ARM64]}" >> $GITHUB_OUTPUT ;;
            linux-only)
              echo "matrix={\"include\":[$LINUX_X64_CUDA,$LINUX_X64_ROCM,$LINUX_X64_OPENVINO,$LINUX_X64_CPU,$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
            *)
              echo "matrix={\"include\":[$WIN_X64,$WIN_X86,$WIN_ARM64,$MAC_X64,$MAC_ARM64,$LINUX_X64_CUDA,$LINUX_X64_ROCM,$LINUX_X64_OPENVINO,$LINUX_X64_CPU,$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
          esac

  verify:
    name: ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python (用于 PNG ↔ BGR 转换 — OpenCvSharp 精简版没编 imgcodecs)
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Pillow (CI 端 PNG↔BGR 转换用,无 numpy 依赖,全平台有 wheel)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Pillow>=10.4"

      - name: Resolve ORT run ID (find run containing matrix.ort_artifact)
        id: ort_run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.ort_run_id }}" ]; then
            echo "id=${{ inputs.ort_run_id }}" >> $GITHUB_OUTPUT
            echo ">>> Using user-specified ORT run ${{ inputs.ort_run_id }}"
          else
            # 重要:per-platform ORT runs 每个 run 只有 1 个平台的 artifact。
            # 不能简单取 latest success — 必须找含 ${{ matrix.ort_artifact }} 的那个。
            ARTIFACT_NAME="${{ matrix.ort_artifact }}"
            echo ">>> Searching success runs for artifact: $ARTIFACT_NAME"
            FOUND=""
            for ID in $(gh run list -R ${{ github.repository }} \
                --workflow="Build ORT 1.25.0 Desktop (Win + Mac + Linux, full GPU/iGPU/CPU)" \
                --status=success --branch=main --limit=30 \
                --json databaseId --jq '.[].databaseId'); do
              if gh api "repos/${{ github.repository }}/actions/runs/$ID/artifacts" \
                  --jq '.artifacts[].name' 2>/dev/null | grep -qFx "$ARTIFACT_NAME"; then
                FOUND=$ID
                break
              fi
            done
            if [ -z "$FOUND" ]; then
              echo "::error::No success ORT run with artifact '$ARTIFACT_NAME' found in last 30 runs"
              exit 1
            fi
            echo "id=$FOUND" >> $GITHUB_OUTPUT
            echo ">>> Using ORT run $FOUND for artifact $ARTIFACT_NAME"
          fi

      - name: Resolve OpenCvSharp run ID (find run containing matrix.ocv_artifact)
        id: ocv_run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.opencv_run_id }}" ]; then
            echo "id=${{ inputs.opencv_run_id }}" >> $GITHUB_OUTPUT
            echo ">>> Using user-specified OpenCvSharp run ${{ inputs.opencv_run_id }}"
          else
            # OpenCvSharp 用 boolean inputs,1 个 run 通常含全 7 archs;但保险起见也按 artifact 名找
            ARTIFACT_NAME="${{ matrix.ocv_artifact }}"
            echo ">>> Searching success runs for artifact: $ARTIFACT_NAME"
            FOUND=""
            for ID in $(gh run list -R ${{ github.repository }} \
                --workflow="Build-Opencvsharp-AllPlatforms-4.10.0" \
                --status=success --branch=main --limit=10 \
                --json databaseId --jq '.[].databaseId'); do
              if gh api "repos/${{ github.repository }}/actions/runs/$ID/artifacts" \
                  --jq '.artifacts[].name' 2>/dev/null | grep -qFx "$ARTIFACT_NAME"; then
                FOUND=$ID
                break
              fi
            done
            if [ -z "$FOUND" ]; then
              echo "::error::No success OpenCvSharp run with artifact '$ARTIFACT_NAME' found"
              exit 1
            fi
            echo "id=$FOUND" >> $GITHUB_OUTPUT
            echo ">>> Using OpenCvSharp run $FOUND for artifact $ARTIFACT_NAME"
          fi

      - name: Download ORT artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p downloads/ort
          gh run download ${{ steps.ort_run.outputs.id }} -R ${{ github.repository }} \
            -n "${{ matrix.ort_artifact }}" -D downloads/ort
          echo ">>> ORT artifact contents:"
          ls -la downloads/ort

      - name: Download OpenCvSharp artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p downloads/ocv
          gh run download ${{ steps.ocv_run.outputs.id }} -R ${{ github.repository }} \
            -n "${{ matrix.ocv_artifact }}" -D downloads/ocv
          echo ">>> OpenCvSharp artifact contents:"
          ls -la downloads/ocv

      - name: Publish C# verify project (RID-specific, optional self-contained)
        shell: bash
        run: |
          cd tests/CSharpVerify
          # 统一用 publish 而不是 build:可以指定 RID,方便 win-x86 self-contained
          # publish_self_contained=true 时 bundle .NET runtime,适合 host arch ≠ 目标 arch 的场景
          if [ "${{ matrix.publish_self_contained }}" = "true" ]; then
            dotnet publish -c Release -r ${{ matrix.rid }} --self-contained true -o publish -v minimal
          else
            dotnet publish -c Release -r ${{ matrix.rid }} --self-contained false -o publish -v minimal
          fi
          echo ">>> publish/ contents:"
          ls -la publish/

      - name: Stage native libs into publish dir
        shell: bash
        run: |
          PUB=tests/CSharpVerify/publish
          # ORT native (主 + 可选附加 dll)
          cp "downloads/ort/${{ matrix.ort_lib }}" "$PUB/"
          if [ -n "${{ matrix.ort_extra }}" ] && [ -f "downloads/ort/${{ matrix.ort_extra }}" ]; then
            cp "downloads/ort/${{ matrix.ort_extra }}" "$PUB/"
          fi
          # OpenCvSharp native
          cp "downloads/ocv/${{ matrix.ocv_lib }}" "$PUB/"
          echo ">>> Final $PUB contents:"
          ls -la "$PUB"

      - name: Generate test.bgr from test.png (CI-only,production 用摄像头帧)
        shell: bash
        run: |
          cd tests
          python png_to_bgr.py
          ls -la test.bgr

      - name: Run C# verify (raw BGR → OpenCvSharp imgproc → ORT 推理 → annotated.bgr)
        shell: bash
        run: |
          cd tests/CSharpVerify
          MODEL=$(realpath ../merged_no_topk_fp16.onnx)
          BGR=$(realpath ../test.bgr)
          OUT="$(pwd)/annotated-${{ matrix.name }}.bgr"
          PUB="$(pwd)/publish"

          EXE_NAME="CSharpVerify"
          if [ "${{ runner.os }}" = "Windows" ]; then
            EXE_NAME="CSharpVerify.exe"
          fi
          chmod +x "publish/$EXE_NAME" 2>/dev/null || true

          # framework-dependent .NET 不会自动搜 publish/ 目录找 native lib;显式加上。
          export DYLD_LIBRARY_PATH="$PUB:${DYLD_LIBRARY_PATH:-}"
          export LD_LIBRARY_PATH="$PUB:${LD_LIBRARY_PATH:-}"
          export PATH="$PUB:$PATH"

          "./publish/$EXE_NAME" "$MODEL" "$BGR" "$OUT"
          ls -la "$OUT"

      - name: Convert annotated.bgr → annotated.png (人肉眼确认 OpenCvSharp 画框正确)
        if: always()
        shell: bash
        run: |
          cd tests/CSharpVerify
          BGR="annotated-${{ matrix.name }}.bgr"
          PNG="annotated-${{ matrix.name }}.png"
          if [ -f "$BGR" ]; then
            python ../bgr_to_png.py "$BGR" "$PNG"
            ls -la "$PNG"
          else
            echo "::warning::$BGR not found, skip PNG conversion"
          fi

      - name: Upload annotated PNG (供肉眼确认 OpenCvSharp 画框 + ORT 推理一起工作)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: annotated-${{ matrix.name }}
          path: tests/CSharpVerify/annotated-${{ matrix.name }}.png
          retention-days: 14
          if-no-files-found: warn
