name: Build ORT 1.18.1 macOS (with CoreML EP)

# 目的：
#   自行编译 ONNX Runtime v1.18.1 macOS native dylib，带 CoreML EP。
#   两平台统一版本 v1.18.1。
#
# 平台配置：
#   Intel x64    : v1.18.1, minos 10.15, 默认 Xcode 16.x, macos-15-intel runner
#   Silicon arm64: v1.18.1, minos 11.0,  Xcode 15.2,      macos-14 runner
#
# 编译兼容性修复：
#   - arm64 固定 Xcode 15.2 (SDK 14.2)，避免 std::to_chars 编译错误 (issue #21033)
#   - x64 使用默认 Xcode 16.x（macos-15-intel 无 Xcode 15.x），通过 patch
#     ostream_sink.cc 和 apple_log_sink.mm 绕过 libc++ <format> 引入
#     std::to_chars (macOS 13.3+) 与低 deployment target 不兼容的编译错误。
#     注意：std::to_chars 浮点版本实现在 libc++.dylib 中（非 header-only），
#     不能用 _LIBCPP_DISABLE_AVAILABILITY（编译过但运行时 Symbol not found 崩溃）。
#     构建时会自动扫描是否有其他文件存在同样问题。
#
# CoreML EP 说明：
#   保留 CoreML EP（与官方 NuGet 包一致）。
#   CoreML 崩溃问题（SIGSEGV）在调用方代码层面解决：
#   不调用 AppendExecutionProvider_CoreML()，CoreML 框架就不会被初始化。
#
# 验证：
#   - lipo 确认 arch
#   - otool 确认 minos
#   - otool -L 列出依赖（CoreML 应存在）
#   - python3 ctypes 加载并调用 OrtGetApiBase()

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - RelWithDebInfo
      target_platform:
        description: 'Target Platform'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - x64-only
          - arm64-only

jobs:
  # 前置 job：根据 target_platform 输入生成 matrix JSON
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          X64='{"arch":"x86_64","deploy_target":"10.15","runner":"macos-15-intel","xcode_version":"","artifact_name":"onnxruntime-1.18.1-x86_64-macos10.15-coreml"}'
          ARM64='{"arch":"arm64","deploy_target":"11.0","runner":"macos-14","xcode_version":"15.2","artifact_name":"onnxruntime-1.18.1-arm64-macos11.0-coreml"}'

          case "${{ inputs.target_platform }}" in
            x64-only)   echo "matrix={\"include\":[$X64]}" >> $GITHUB_OUTPUT ;;
            arm64-only) echo "matrix={\"include\":[$ARM64]}" >> $GITHUB_OUTPUT ;;
            *)          echo "matrix={\"include\":[$X64,$ARM64]}" >> $GITHUB_OUTPUT ;;
          esac

  build:
    name: Build v1.18.1 (${{ matrix.arch }}, minos ${{ matrix.deploy_target }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ORT_VERSION: 'v1.18.1'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    # matrix 配置说明：
    #   Intel x64  : macos-15-intel, 默认 Xcode 16.x + patch ostream_sink.cc & apple_log_sink.mm
    #   Silicon arm64: macos-14, 固定 Xcode 15.2, 避免 std::to_chars 编译错误

    steps:
      - name: Select Xcode Version
        if: matrix.xcode_version != ''
        run: |
          sudo xcode-select --switch /Applications/Xcode_${{ matrix.xcode_version }}.app/Contents/Developer
          echo "Switched to Xcode ${{ matrix.xcode_version }}"
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Checkout ONNX Runtime ${{ env.ORT_VERSION }}
        uses: actions/checkout@v4.2.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ env.ORT_VERSION }}
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          # runner 预装的 CMake 可能是 4.x，ORT 1.18.1 不支持 CMake 4.x
          # 参考: https://github.com/microsoft/onnxruntime/issues/27503
          pip install "cmake>=3.26,<4" numpy
          # ninja 在 runner 上可能已预装，用 command -v 判断跳过
          if ! command -v ninja &>/dev/null; then
            brew install ninja
          else
            echo "ninja $(ninja --version) already installed, skipping"
          fi
          echo "CMake version: $(cmake --version | head -1)"
          echo "Ninja version: $(ninja --version)"

      - name: Patch Source Code (Fix Eigen Hash)
        run: |
          grep -rl "be8be39fdbc6e60e94fa7870b280707069b5b81a" . \
            | xargs sed -i '' 's/be8be39fdbc6e60e94fa7870b280707069b5b81a/32b145f525a8308d7ab1c09388b2e288312d8eba/g' \
            || true

      - name: Patch chrono stream output (Fix std::to_chars on Xcode 16.x)
        # 问题：Xcode 16.x libc++ 的 chrono operator<< 引入 <format>，
        #   std::format 浮点格式化需要 std::to_chars (macOS 13.3+)，
        #   与 deployment_target 10.15 不兼容。
        #   std::to_chars 浮点版本实现在 libc++.dylib 中（非 header-only），
        #   macOS 10.15 的系统 libc++ 没有该符号，
        #   因此不能用 _LIBCPP_DISABLE_AVAILABILITY（编译过但运行时崩溃）。
        # 修复策略：
        #   1) 精确 patch 已知的两个 log sink 文件（用 strftime 替代 chrono 流输出）
        #   2) 自动扫描 ORT 源码中所有使用 "using timestamp_ns::operator<<"
        #      或 "date/date.h" + "operator<<" 的文件，发出警告
        # arm64 用 Xcode 15.2 不受影响，但此 patch 对两平台均安全。
        run: |
          echo "=== [1/3] Patch ostream_sink.cc ==="
          cat > "onnxruntime/core/common/logging/sinks/ostream_sink.cc" << 'PATCH_EOF'
          // Copyright (c) Microsoft Corporation. All rights reserved.
          // Licensed under the MIT License.

          // Patched: replaced chrono operator<< with strftime to avoid
          // Xcode 16.x libc++ <format> -> std::to_chars (macOS 13.3+) dependency.
          // Note: stream_ is std::ostream* (pointer), use (*stream_) and stream_->

          #include "core/common/logging/sinks/ostream_sink.h"
          #include "core/common/logging/logging.h"
          #include <ctime>
          #include <iomanip>
          #include <iostream>
          #include <sstream>

          namespace onnxruntime {
          namespace logging {

          #ifndef ORT_MINIMAL_BUILD
          struct Color {
            constexpr static const char* kWarn = "\033[0;93m";
            constexpr static const char* kError = "\033[1;31m";
            constexpr static const char* kFatal = "\033[1;37;41m";
            constexpr static const char* kEnd = "\033[m";
          };
          #endif

          void OStreamSink::SendImpl(const Timestamp& timestamp, const std::string& logger_id,
                                     const Capture& message) {
            auto time_t_val = std::chrono::system_clock::to_time_t(timestamp);
            auto tm_val = *std::localtime(&time_t_val);
            auto us = std::chrono::duration_cast<std::chrono::microseconds>(
                           timestamp.time_since_epoch()) %
                       1000000;

            std::ostringstream msg;

          #ifndef ORT_MINIMAL_BUILD
            if (message.Severity() == Severity::kWARNING) {
              msg << Color::kWarn;
            } else if (message.Severity() == Severity::kERROR) {
              msg << Color::kError;
            } else if (message.Severity() == Severity::kFATAL) {
              msg << Color::kFatal;
            }
          #endif

            msg << std::put_time(&tm_val, "%Y-%m-%d %H:%M:%S")
                << "." << std::setfill('0') << std::setw(6) << us.count()
                << " [" << message.SeverityPrefix() << ":" << message.Category()
                << ":" << logger_id << ", "
                << message.Location().ToString() << "] " << message.Message();

          #ifndef ORT_MINIMAL_BUILD
            if (message.Severity() == Severity::kWARNING ||
                message.Severity() == Severity::kERROR ||
                message.Severity() == Severity::kFATAL) {
              msg << Color::kEnd;
            }
          #endif
            msg << "\n";

            (*stream_) << msg.str();

            if (flush_) {
              stream_->flush();
            }
          }

          }  // namespace logging
          }  // namespace onnxruntime
          PATCH_EOF
          echo ">>> ostream_sink.cc patched"

          echo "=== [2/3] Patch apple_log_sink.mm ==="
          cat > "onnxruntime/core/platform/apple/logging/apple_log_sink.mm" << 'PATCH_EOF'
          // Copyright (c) Microsoft Corporation. All rights reserved.
          // Licensed under the MIT License.

          // Patched: replaced chrono operator<< with strftime to avoid
          // Xcode 16.x libc++ <format> -> std::to_chars (macOS 13.3+) dependency.

          #include "core/platform/apple/logging/apple_log_sink.h"

          #import <Foundation/Foundation.h>

          #include <ctime>
          #include <iomanip>
          #include <sstream>

          namespace onnxruntime {
          namespace logging {

          void AppleLogSink::SendImpl(const Timestamp& timestamp, const std::string& logger_id,
                                      const Capture& message) {
            auto time_t_val = std::chrono::system_clock::to_time_t(timestamp);
            auto tm_val = *std::localtime(&time_t_val);
            auto us = std::chrono::duration_cast<std::chrono::microseconds>(
                           timestamp.time_since_epoch()) %
                       1000000;

            std::ostringstream msg;
            msg << std::put_time(&tm_val, "%Y-%m-%d %H:%M:%S")
                << "." << std::setfill('0') << std::setw(6) << us.count()
                << " [" << message.SeverityPrefix() << ":" << message.Category()
                << ":" << logger_id << ", "
                << message.Location().ToString() << "] " << message.Message();

            NSLog(@"%s", msg.str().c_str());
          }

          }  // namespace logging
          }  // namespace onnxruntime
          PATCH_EOF
          echo ">>> apple_log_sink.mm patched"

          echo "=== [3/3] Scan for other potential chrono operator<< usage ==="
          # 扫描 ORT 源码中可能触发同样问题的文件：
          #   - 使用 "using timestamp_ns::operator<<" 或 "using date::operator<<" 的文件
          # 排除规则：
          #   - 已 patch 的文件
          #   - posix/logging/syslog_sink.cc：仅在 onnxruntime_USE_SYSLOG=ON 时编译，
          #     本构建未启用该选项，不会触发问题
          SUSPECTS=$(grep -rl "timestamp_ns::operator<<\|using date::operator<<" \
            --include='*.cc' --include='*.cpp' --include='*.mm' \
            onnxruntime/ 2>/dev/null \
            | grep -v "ostream_sink.cc" \
            | grep -v "apple_log_sink.mm" \
            | grep -v "syslog_sink.cc" \
            || true)
          if [ -n "$SUSPECTS" ]; then
            echo "⚠️  WARNING: Found additional files using chrono/date operator<<"
            echo "   These may trigger std::to_chars errors on Xcode 16.x + low deployment target:"
            echo "$SUSPECTS"
            echo "   If build fails, these files may also need patching."
          else
            echo "✅ No additional suspect files found"
          fi

      - name: Build
        run: |
          echo ">>> Building ORT ${{ env.ORT_VERSION }} for ${{ matrix.arch }} (minos ${{ matrix.deploy_target }})"
          python3 tools/ci_build/build.py \
            --build_dir build \
            --config ${{ inputs.build_type }} \
            --use_coreml \
            --parallel \
            --build_shared_lib \
            --skip_tests \
            --skip_submodule_sync \
            --compile_no_warning_as_error \
            --osx_arch ${{ matrix.arch }} \
            --cmake_extra_defines \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deploy_target }} \
              CMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
              CMAKE_OSX_SYSROOT=macosx \
              onnxruntime_BUILD_UNIT_TESTS=OFF \
              onnxruntime_BUILD_BENCHMARKS=OFF

      - name: Verify - file exists
        run: |
          FILE="build/${{ inputs.build_type }}/libonnxruntime.dylib"
          if [ -f "$FILE" ]; then
            echo "✅ Build succeeded"
            ls -lh "$FILE"
          else
            echo "❌ Build failed: $FILE not found"
            exit 1
          fi

      - name: Verify - arch
        run: |
          FILE="build/${{ inputs.build_type }}/libonnxruntime.dylib"
          echo ">>> lipo -info:"
          lipo -info "$FILE"
          lipo -info "$FILE" | grep -q "${{ matrix.arch }}" \
            && echo "✅ arch=${{ matrix.arch }} confirmed" \
            || (echo "❌ arch mismatch!" && exit 1)

      - name: Verify - minos (deployment target)
        run: |
          FILE="build/${{ inputs.build_type }}/libonnxruntime.dylib"

          echo ">>> otool LC_BUILD_VERSION:"
          otool -l "$FILE" | grep -A 6 LC_BUILD_VERSION || true

          echo ">>> otool LC_VERSION_MIN_MACOSX (fallback):"
          otool -l "$FILE" | grep -A 3 LC_VERSION_MIN_MACOSX || true

          # 提取实际 minos（优先 LC_BUILD_VERSION，回退 LC_VERSION_MIN_MACOSX）
          MINOS=$(otool -l "$FILE" | awk '
            $1=="cmd" && $2=="LC_BUILD_VERSION" { in_blk=1 }
            in_blk && $1=="minos" { print $2; exit }
          ')
          if [ -z "$MINOS" ]; then
            MINOS=$(otool -l "$FILE" | awk '
              $1=="cmd" && $2=="LC_VERSION_MIN_MACOSX" { in_blk=1 }
              in_blk && $1=="version" { print $2; exit }
            ')
          fi

          echo ">>> Detected minos : $MINOS"
          echo ">>> Expected minos : ${{ matrix.deploy_target }}"

          if [ "$MINOS" = "${{ matrix.deploy_target }}" ]; then
            echo "✅ minos=$MINOS confirmed"
          else
            echo "❌ minos mismatch! got=$MINOS expected=${{ matrix.deploy_target }}"
            exit 1
          fi

      - name: Verify - dylib dependencies (otool -L)
        run: |
          FILE="build/${{ inputs.build_type }}/libonnxruntime.dylib"
          echo ">>> otool -L:"
          otool -L "$FILE"
          # CoreML 应存在（带 CoreML EP 编译）
          if otool -L "$FILE" | grep -q "CoreML"; then
            echo "✅ CoreML dependency present (expected for CoreML EP build)"
          else
            echo "⚠️  WARNING: CoreML dependency not found (unexpected for CoreML EP build)"
          fi

      - name: Verify - load with Python ctypes
        run: |
          FILE="$(pwd)/build/${{ inputs.build_type }}/libonnxruntime.dylib"
          python3 - <<EOF
          import ctypes, sys, os

          lib_path = "$FILE"
          print(f"Loading: {lib_path}")
          print(f"Size: {os.path.getsize(lib_path):,} bytes")

          try:
              lib = ctypes.CDLL(lib_path)
              print("✅ ctypes.CDLL load succeeded")
          except OSError as e:
              print(f"❌ Load failed: {e}")
              sys.exit(1)

          try:
              fn = lib.OrtGetApiBase
              fn.restype = ctypes.c_void_p
              fn.argtypes = []
              ptr = fn()
              if ptr:
                  print(f"✅ OrtGetApiBase() = {hex(ptr)}")
              else:
                  print("❌ OrtGetApiBase() returned NULL")
                  sys.exit(1)
          except AttributeError as e:
              print(f"❌ Symbol not found: {e}")
              sys.exit(1)

          print("✅ All verification passed")
          EOF

      - name: Organize artifacts
        run: |
          mkdir -p artifacts
          cp build/${{ inputs.build_type }}/libonnxruntime.dylib artifacts/
          cat > artifacts/version.txt <<EOF
          ORT Version:    ${{ env.ORT_VERSION }}
          Arch:           ${{ matrix.arch }}
          Runner:         ${{ matrix.runner }}
          MinOS:          ${{ matrix.deploy_target }}
          CoreML EP:      enabled
          Build Type:     ${{ inputs.build_type }}
          EOF
          echo ">>> Artifacts:"
          ls -lh artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          retention-days: 90
