name: "[DEPRECATED] Build ORT CoreML (Fast & No Tests)"

# ⚠️  此 workflow 已废弃，请使用：
#     "Extract ORT 1.18.1 macOS (CPU-only, No CoreML).yml"
#
# 废弃原因：
#   1. 版本不统一：x86_64 用 v1.16.3，arm64 用 v1.18.1
#   2. CoreML EP 导致崩溃：CoreML 框架在初始化时会向 .NET TP Worker 线程注册
#      Objective-C TLS 析构回调，线程退出时 autorelease pool 清理会访问已释放
#      的 ObjC 对象，导致 SIGSEGV（约运行 20-60 秒后必现）
#   3. 编译耗时长（约 30-60 分钟），而官方 NuGet 包已包含所需 dylib，直接提取即可
#
# 新方案：直接从官方 NuGet microsoft.ml.onnxruntime 1.18.1 提取：
#   - osx-x64  libonnxruntime.dylib  (minos 10.15, CPU-only)
#   - osx-arm64 libonnxruntime.dylib (minos 11.0,  CPU-only)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '此 workflow 已废弃。输入 yes 确认仍要运行（不推荐）'
        required: true
        default: 'no'

jobs:
  deprecated-warning:
    runs-on: ubuntu-latest
    steps:
      - name: Show deprecation notice
        run: |
          echo "::warning::此 workflow 已废弃！请使用 'Extract ORT 1.18.1 macOS (CPU-only, No CoreML)' workflow。"
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "::error::未确认继续运行，已中止。请使用新 workflow。"
            exit 1
          fi
          echo "::warning::用户确认继续运行已废弃的 workflow，建议尽快迁移到新 workflow。"
