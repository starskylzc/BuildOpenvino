name: Verify Fused Model (跨平台 CPU EP 推理验证)

# 目的:
#   端到端验证 — 我们做过 ONNX surgery (移除 TopK/ReduceMax/ArgMax) 的
#   merged_no_topk_fp16.onnx 在所有平台用 ORT 1.25 CPU EP 跑 test.png 都能
#   稳定输出 face / phone / lens 三类检测结果。
#
# 分平台跑,每个平台 5 min 内完成。失败任何一档表示模型有平台兼容性问题。
#
# 验证矩阵:
#   - Win x64       (CPU EP via PyPI onnxruntime)
#   - macOS x64     (CPU EP)
#   - macOS arm64   (CPU EP, Apple Silicon)
#   - Linux x64     (CPU EP, ubuntu-24.04)
#   - Linux arm64   (CPU EP, ubuntu-24.04-arm)
#
# 注:这里用 PyPI onnxruntime==1.25.0,验证的是模型 + ORT 1.25 兼容性,
#     不是验证我们自己 build 的 native 二进制 (那个由 Build ORT workflow 的
#     smoke load test 验证基础加载性)。

on:
  workflow_dispatch:
    inputs:
      target_set:
        description: 'Which platforms to verify (推荐:每次只跑一个)'
        required: true
        default: 'all'
        type: choice
        options:
          # ── 单平台档 ──
          - win-x64
          - osx-x64
          - osx-arm64
          - linux-x64
          - linux-arm64
          # ── 聚合档 ──
          - all
          - windows-only
          - macos-only
          - linux-only

env:
  # PyPI 还没发 1.25.0 (最新 1.23.2),用 1.23.2 验证模型 forward compat 即可。
  # 真"我们 build 的 1.25.0" 的验证由 Verify Built Artifacts (CSharp) workflow 做。
  ORT_VERSION: "1.23.2"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # 全平台统一 Python 3.11 (3.11 是 Win ARM64 首个支持版,所以取它当最低公共分母)
          WIN_X64='{"name":"win-x64","runner":"windows-2022","python":"3.11"}'
          MAC_X64='{"name":"osx-x64","runner":"macos-15-intel","python":"3.11"}'
          MAC_ARM64='{"name":"osx-arm64","runner":"macos-14","python":"3.11"}'
          LINUX_X64='{"name":"linux-x64","runner":"ubuntu-24.04","python":"3.11"}'
          LINUX_ARM64='{"name":"linux-arm64","runner":"ubuntu-24.04-arm","python":"3.11"}'

          case "${{ inputs.target_set }}" in
            # ── 单平台档 ──
            win-x64)      echo "matrix={\"include\":[$WIN_X64]}" >> $GITHUB_OUTPUT ;;
            osx-x64)      echo "matrix={\"include\":[$MAC_X64]}" >> $GITHUB_OUTPUT ;;
            osx-arm64)    echo "matrix={\"include\":[$MAC_ARM64]}" >> $GITHUB_OUTPUT ;;
            linux-x64)    echo "matrix={\"include\":[$LINUX_X64]}" >> $GITHUB_OUTPUT ;;
            linux-arm64)  echo "matrix={\"include\":[$LINUX_ARM64]}" >> $GITHUB_OUTPUT ;;
            # ── 聚合档 ──
            windows-only) echo "matrix={\"include\":[$WIN_X64]}" >> $GITHUB_OUTPUT ;;
            macos-only)   echo "matrix={\"include\":[$MAC_X64,$MAC_ARM64]}" >> $GITHUB_OUTPUT ;;
            linux-only)   echo "matrix={\"include\":[$LINUX_X64,$LINUX_ARM64]}" >> $GITHUB_OUTPUT ;;
            *)            echo "matrix={\"include\":[$WIN_X64,$MAC_X64,$MAC_ARM64,$LINUX_X64,$LINUX_ARM64]}" >> $GITHUB_OUTPUT ;;
          esac

  verify:
    name: ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install ONNX Runtime + OpenCV
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "onnxruntime==${{ env.ORT_VERSION }}" "numpy<2" "opencv-python-headless"

      - name: Run inference on test.png + assert detections
        shell: bash
        env:
          # Win Python 默认 stdout cp1252,中文 print 会 UnicodeEncodeError。
          # 强制 UTF-8 输出,Mac/Linux 默认就是 UTF-8 不受影响。
          PYTHONIOENCODING: utf-8
        run: |
          python tests/verify_fused_model.py
