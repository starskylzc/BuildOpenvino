name: Build ORT 1.25.0 Desktop (Win + Mac + Linux, full GPU/iGPU/CPU)

# 目的：
#   一个 workflow 一次性产出三平台桌面端 ORT v1.25.0 native 二进制。
#   覆盖 GPU + iGPU + CPU,不含服务器场景 (Ascend/海光DCU/Instinct 等服务器加速卡不做)。
#
# 平台 / EP 完整覆盖矩阵：
#   ┌─────────────────────────┬──────────────┬──────────────────┬──────────────┬───────────┐
#   │ Target                  │ OS Floor     │ GPU 覆盖         │ EP           │ glibc     │
#   ├─────────────────────────┼──────────────┼──────────────────┼──────────────┼───────────┤
#   │ win-x64-dml             │ Win 10 1903  │ NV/AMD/Intel/iGPU│ DML + CPU    │ —         │
#   │ win-x86-cpu             │ Win 10 1903  │ —                │ CPU          │ —         │
#   │ win-arm64-dml           │ Win 10 1903  │ Snapdragon Adreno│ DML + CPU    │ —         │
#   │ osx-x64-coreml          │ macOS 10.15  │ AMD Pro/Intel iGPU│ CoreML + CPU│ —         │
#   │ osx-arm64-coreml        │ macOS 11.0   │ Apple GPU + ANE  │ CoreML + CPU │ —         │
#   │ linux-x64-cuda          │ Ubuntu 22.04 │ NVIDIA dGPU      │ CUDA + CPU   │ 2.35      │
#   │ linux-x64-rocm          │ Ubuntu 22.04 │ AMD Radeon dGPU  │ ROCm + CPU   │ 2.35      │
#   │ linux-x64-openvino      │ ov2025.4.1   │ Intel iGPU/Arc   │ OpenVINO+CPU │ 2.35      │
#   │ linux-x64-cpu           │ ubuntu:18.04 │ —                │ CPU          │ 2.27      │
#   │ linux-arm64-cpu         │ ubuntu:18.04 │ —                │ CPU          │ 2.27      │
#   └─────────────────────────┴──────────────┴──────────────────┴──────────────┴───────────┘
#
# 跟 OpenCvSharp 4.10.0 完全对齐 (10 档 archs):
#   - Win x64/x86/arm64 + macOS x64/arm64 + Linux 5 EP variants
#   - Linux CPU floor glibc 2.27 (ubuntu:18.04 docker)
#   - actions/checkout@v6, actions/upload-artifact@v7, ubuntu-24.04-arm runner
#
# Linux glibc 策略:
#   - CPU 档 (x64 + arm64) 都用 ubuntu:18.04 (glibc 2.27),覆盖最广:
#     Ubuntu 18.04+ / 中标麒麟 V7+ / 银河麒麟 V10 全系 / 统信 UOS V20+ / RHEL 7+
#     需要 ubuntu-toolchain-r PPA 装 gcc-11,deadsnakes PPA 装 Python 3.10
#   - GPU 加速档 (cuda/rocm/openvino) 用 Ubuntu 22.04 base (glibc 2.35),
#     SDK 本身针对 Ubuntu 22.04 编,降版本不可行
#
# DirectML.dll "自动版本匹配" 策略：
#   ORT 编译时自动从 NuGet 拉取 DirectML.dll,跟 onnxruntime.dll 同源 ship。
#   绝对不会出现客户端 DML 版本不匹配。
#
# CUDA / cuDNN 自带:
#   linux-x64-cuda artifact 内附带 CUDA 12 cudart + cuBLAS + cuDNN 9 runtime .so,
#   客户端不需要自己装 CUDA Toolkit。
#
# ROCm 自带:
#   linux-x64-rocm artifact 内附带 ROCm 6.2 关键 runtime .so,
#   客户端只需要 AMD 驱动 + amdgpu kmod,不需要装完整 ROCm Toolkit。

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - RelWithDebInfo
      target_set:
        description: 'Which platforms to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows-only
          - macos-only
          - linux-only
          - linux-cpu-only      # 信创最稳的兜底,只要这一档
          - linux-gpu-only      # 不含 cpu/arm64,仅 GPU 加速档

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # arch:    x64/arm64/x86_64       ORT build.py / cmake 用的 arch 名 (注意 macOS 用 x86_64)
          # ep:      dml/coreml/cuda/rocm/openvino/cpu
          # runner:  GHA 主机
          # docker:  容器 image (空表示直接在 runner 上跑)
          # deploy_target / xcode_version: 仅 macOS 用
          # artifact_name: 上传产物名

          WIN_X64_DML='{"platform":"windows","arch":"x64","ep":"dml","runner":"windows-2022","docker":"","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-win-x64-dml"}'
          WIN_X86_CPU='{"platform":"windows","arch":"x86","ep":"cpu","runner":"windows-2022","docker":"","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-win-x86-cpu"}'
          WIN_ARM64_DML='{"platform":"windows","arch":"arm64","ep":"dml","runner":"windows-11-arm","docker":"","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-win-arm64-dml"}'
          MAC_X64_COREML='{"platform":"macos","arch":"x86_64","ep":"coreml","runner":"macos-15-intel","docker":"","deploy_target":"10.15","xcode_version":"","artifact_name":"onnxruntime-1.25.0-osx-x64-coreml"}'
          MAC_ARM64_COREML='{"platform":"macos","arch":"arm64","ep":"coreml","runner":"macos-14","docker":"","deploy_target":"11.0","xcode_version":"15.2","artifact_name":"onnxruntime-1.25.0-osx-arm64-coreml"}'

          # Linux 各档 (用 docker 字段控制容器)
          # ★ CPU 档跟 OpenCvSharp 4.10.0 完全对齐:ubuntu:18.04 / arm64v8/ubuntu:18.04 (glibc 2.27)
          #   覆盖 Ubuntu 18.04+ / 中标麒麟 V7 / 银河麒麟 V10 全系 / 统信 UOS V20 / Anolis 8 / RHEL 7+
          # ★ arm64 runner 升 ubuntu-24.04-arm,跟 OpenCvSharp 一致
          LINUX_X64_CUDA='{"platform":"linux","arch":"x64","ep":"cuda","runner":"ubuntu-22.04","docker":"nvidia/cuda:12.9.1-cudnn-devel-ubuntu22.04","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-x64-cuda"}'
          LINUX_X64_ROCM='{"platform":"linux","arch":"x64","ep":"rocm","runner":"ubuntu-22.04","docker":"rocm/dev-ubuntu-22.04:6.2.4-complete","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-x64-rocm"}'
          LINUX_X64_OPENVINO='{"platform":"linux","arch":"x64","ep":"openvino","runner":"ubuntu-22.04","docker":"openvino/ubuntu22_dev:2025.4.1","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-x64-openvino"}'
          LINUX_X64_CPU='{"platform":"linux","arch":"x64","ep":"cpu","runner":"ubuntu-24.04","docker":"ubuntu:18.04","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-x64-cpu"}'
          LINUX_ARM64_CPU='{"platform":"linux","arch":"arm64","ep":"cpu","runner":"ubuntu-24.04-arm","docker":"arm64v8/ubuntu:18.04","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-arm64-cpu"}'

          case "${{ inputs.target_set }}" in
            windows-only)
              echo "matrix={\"include\":[$WIN_X64_DML,$WIN_X86_CPU,$WIN_ARM64_DML]}" >> $GITHUB_OUTPUT ;;
            macos-only)
              echo "matrix={\"include\":[$MAC_X64_COREML,$MAC_ARM64_COREML]}" >> $GITHUB_OUTPUT ;;
            linux-only)
              echo "matrix={\"include\":[$LINUX_X64_CUDA,$LINUX_X64_ROCM,$LINUX_X64_OPENVINO,$LINUX_X64_CPU,$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
            linux-cpu-only)
              echo "matrix={\"include\":[$LINUX_X64_CPU,$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
            linux-gpu-only)
              echo "matrix={\"include\":[$LINUX_X64_CUDA,$LINUX_X64_ROCM,$LINUX_X64_OPENVINO]}" >> $GITHUB_OUTPUT ;;
            *)
              echo "matrix={\"include\":[$WIN_X64_DML,$WIN_X86_CPU,$WIN_ARM64_DML,$MAC_X64_COREML,$MAC_ARM64_COREML,$LINUX_X64_CUDA,$LINUX_X64_ROCM,$LINUX_X64_OPENVINO,$LINUX_X64_CPU,$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
          esac

  build:
    name: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.ep }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    env:
      ORT_VERSION: 'v1.25.0'
      # 强制所有 JavaScript action 用 Node 24 (上游 v5/v6 部分仍标 Node 20)。
      # 2026-06-02 后 GHA 默认 Node 24,此变量提前对齐,消除 deprecation warning。
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      # ============================================================
      # 1. Checkout (所有平台共用)
      # ============================================================
      - name: Checkout ONNX Runtime ${{ env.ORT_VERSION }}
        uses: actions/checkout@v6
        with:
          repository: microsoft/onnxruntime
          ref: ${{ env.ORT_VERSION }}
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python (non-linux only)
        if: matrix.platform != 'linux'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # ============================================================
      # 2. macOS Xcode 选择
      # ============================================================
      - name: Select Xcode (macOS only)
        if: matrix.platform == 'macos' && matrix.xcode_version != ''
        shell: bash
        run: |
          sudo xcode-select --switch /Applications/Xcode_${{ matrix.xcode_version }}.app/Contents/Developer
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Show default Xcode + assert chrono guard precondition (macOS x64)
        if: matrix.platform == 'macos' && matrix.xcode_version == ''
        shell: bash
        run: |
          xcodebuild -version
          xcrun --show-sdk-version
          SDK_VER=$(xcrun --show-sdk-version)
          echo ">>> Default Xcode SDK version: $SDK_VER"

          # 2 重保护:
          #   (a) deploy_target=10.15 < 13.3 → ORT_USE_CXX20_STD_CHRONO #undef
          #   (b) 即使 SDK 升到 14.4+ (Xcode 15.4+),deploy < 13.3 也兜底 undef
          # 任何一个生效都安全。这里把 deploy_target 显式 echo 出来便于排查。
          echo ">>> Deploy target: ${{ matrix.deploy_target }} (< 13.3 satisfies #undef)"

          # 同时检查 ORT 1.25 logging.cc 的 guard 还在
          F="onnxruntime/core/common/logging/logging.cc"
          if [ -f "$F" ]; then
            grep -n "ORT_USE_CXX20_STD_CHRONO" "$F" | head -3
          fi

      # ============================================================
      # 3. 安装依赖 (per-platform)
      # ============================================================
      - name: Install deps (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          pip install "cmake>=3.28,<4" "numpy<2" psutil setuptools wheel

          # ── 1) pip cmake 路径 (Win ARM64 runner 默认 CMake 4.3 破坏 pytorch_cpuinfo) ──
          $pipCmake = python -c "import sysconfig, os; p=os.path.join(sysconfig.get_path('scripts'),'cmake.exe'); print(p if os.path.exists(p) else '')"
          $pipCmake = ($pipCmake | Out-String).Trim()
          if ($pipCmake -and (Test-Path $pipCmake)) {
            "PIP_CMAKE_PATH=$pipCmake" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host ">>> pip cmake: $pipCmake"
            & $pipCmake --version
          } else {
            Write-Host "::warning::pip cmake not found, build.py 会用系统 cmake"
            cmake --version
          }

          # ── 2) Win ARM64: Strawberry Perl 自带的 patch.exe 在 ARM64 上 assertion fail (line 354 hunk) ──
          # 用 Git 的 patch.exe (在 C:\Program Files\Git\usr\bin\) 替代。
          # 把 Git\usr\bin 加到 PATH 最前面,确保 cmake FetchContent 调用 patch 时优先找到 Git 那个。
          if ("${{ matrix.arch }}" -eq "arm64") {
            $gitPatchDir = "C:\Program Files\Git\usr\bin"
            if (Test-Path "$gitPatchDir\patch.exe") {
              "PATH=$gitPatchDir;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
              Write-Host ">>> 优先使用 Git patch.exe ($gitPatchDir\patch.exe)"
              & "$gitPatchDir\patch.exe" --version | Select-Object -First 1
            } else {
              Write-Host "::warning::Git patch.exe not found at $gitPatchDir, may hit Strawberry patch.exe assertion bug"
            }
            # 同时把 Strawberry Perl 的 patch.exe 改名禁用 (双保险)
            $strawberryPatch = "C:\Strawberry\c\bin\patch.exe"
            if (Test-Path $strawberryPatch) {
              Move-Item $strawberryPatch "$strawberryPatch.disabled" -Force
              Write-Host ">>> 已禁用 Strawberry patch.exe (rename → .disabled)"
            }
          }

      - name: Setup MSBuild (Windows)
        if: matrix.platform == 'windows'
        uses: microsoft/setup-msbuild@v2

      - name: Install deps (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          pip install "cmake>=3.28,<4" "numpy<2"
          if ! command -v ninja &>/dev/null; then brew install ninja; fi
          cmake --version

      # OpenVINO 走 Intel 官方 dev Docker 镜像 (openvino/ubuntu22_dev:2025.4.1):
      #   - OpenVINO 预装 /opt/intel/openvino_2025
      #   - 包含 setupvars.sh / OpenVINOConfig.cmake / 全部 plugin
      #   - 跨发布版本路径稳定,不需要 host 上装 deps

      # arm64 cpu 改用 manylinux_2_28_aarch64 容器 (glibc 2.28),
      # 覆盖银河麒麟 V10 SP1 ARM / 统信 UOS V20 ARM,无需在 host 装 deps。
      # (容器内已有 gcc/g++/Python/CMake)

      # ============================================================
      # 4. macOS-only: 校验 ORT 1.25 的内置 chrono guard 是否生效
      #
      # 背景:
      #   - 1.18.1 没有 ORT_USE_CXX20_STD_CHRONO 宏,需要外部 patch ostream_sink.cc
      #     + apple_log_sink.mm 来绕过 std::to_chars (macOS 13.4+)
      #   - 1.25.0 在 logging.cc 自己加了保护:
      #         #if (SDK < 14.4) || (deploy_target < 13.3)
      #             #undef ORT_USE_CXX20_STD_CHRONO
      #         #endif
      #     若禁用 → fallback 到 date 库 (header-only, 不引 <format>),无 to_chars 依赖
      #
      # 我们的两档:
      #   - x64:   Xcode 16.x SDK 15+ (>= 14.4) ✓  但 deploy_target 10.15 < 13.3 ✗
      #   - arm64: Xcode 15.2 SDK 14.2 (< 14.4) ✗  deploy_target 11.0 < 13.3 ✗
      #
      #   两档都至少满足一个 #undef 条件,所以 ORT 1.25 自动用 date fallback,
      #   完全不需要外部 patch。我们只做 sanity check 确认 logging.cc 里有这个 guard。
      # ============================================================
      - name: Verify ORT 1.25 chrono guard (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          F="onnxruntime/core/common/logging/logging.cc"
          if ! grep -q "ORT_USE_CXX20_STD_CHRONO" "$F"; then
            echo "::error::ORT 1.25 不再有 ORT_USE_CXX20_STD_CHRONO 保护宏 — 需要重新评估 patch 策略"
            head -100 "$F"
            exit 1
          fi
          if ! grep -q "__MAC_OS_X_VERSION_MIN_REQUIRED < 130300" "$F"; then
            echo "::error::macOS deploy_target < 13.3 的保护条件没找到 — patch 策略需重写"
            grep -n -B 2 -A 5 "ORT_USE_CXX20_STD_CHRONO" "$F"
            exit 1
          fi
          echo "✅ ORT 1.25 logging.cc 自带 chrono guard,fallback 到 date 库,无需外部 patch"
          grep -n -B 2 -A 8 "TARGET_OS_MAC" "$F" | head -30

      # ============================================================
      # 5. Build (per-platform/per-EP)
      # ============================================================

      # ---- Windows ----
      - name: Build (Windows DML/CPU)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $epFlags = @()
          switch ("${{ matrix.ep }}") {
            "dml" { $epFlags += "--use_dml" }
            "cpu" { } # CPU 默认
          }
          $archFlags = @()
          switch ("${{ matrix.arch }}") {
            "x86"   { $archFlags += "--x86" }
            "arm64" { $archFlags += "--arm64" }
            # x64 默认,不加 flag
          }

          $allArgs = @(
            "tools/ci_build/build.py",
            "--build_dir", "build",
            "--config", "${{ inputs.build_type }}",
            "--parallel",
            "--build_shared_lib",
            "--skip_tests",
            "--skip_submodule_sync",
            "--compile_no_warning_as_error",
            "--cmake_generator", "Visual Studio 17 2022"
          )
          # Win ARM64 (windows-11-arm runner) 系统 CMake 4.3 破坏 pytorch_cpuinfo,
          # 显式让 build.py 用 pip 装的 cmake (< 4)。
          if ($env:PIP_CMAKE_PATH) {
            $allArgs += @("--cmake_path", $env:PIP_CMAKE_PATH)
            Write-Host ">>> 使用 pip cmake: $env:PIP_CMAKE_PATH"
          }
          $allArgs += $epFlags
          $allArgs += $archFlags
          $allArgs += @("--cmake_extra_defines",
                         "onnxruntime_BUILD_UNIT_TESTS=OFF",
                         "onnxruntime_BUILD_BENCHMARKS=OFF")
          python @allArgs
          if ($LASTEXITCODE -ne 0) { throw "Build failed code=$LASTEXITCODE" }

      # ---- macOS ----
      - name: Build (macOS CoreML)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          python3 tools/ci_build/build.py \
            --build_dir build \
            --config ${{ inputs.build_type }} \
            --use_coreml \
            --parallel \
            --build_shared_lib \
            --skip_tests \
            --skip_submodule_sync \
            --compile_no_warning_as_error \
            --osx_arch ${{ matrix.arch }} \
            --cmake_extra_defines \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deploy_target }} \
              CMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
              CMAKE_OSX_SYSROOT=macosx \
              onnxruntime_BUILD_UNIT_TESTS=OFF \
              onnxruntime_BUILD_BENCHMARKS=OFF

      # ---- Linux x64 CUDA (in nvidia/cuda container) ----
      - name: Build (Linux x64 CUDA, in container)
        if: matrix.platform == 'linux' && matrix.ep == 'cuda'
        shell: bash
        run: |
          docker run --rm --user root \
            -v "$(pwd):/work" -w /work \
            -e ORT_VERSION="${{ env.ORT_VERSION }}" \
            "${{ matrix.docker }}" \
            bash -c '
              set -ex
              apt-get update -y
              apt-get install -y --no-install-recommends \
                build-essential ninja-build pkg-config \
                libssl-dev libcurl4-openssl-dev zlib1g-dev \
                python3 python3-pip python3-dev \
                protobuf-compiler libprotobuf-dev \
                git ca-certificates
              # Ubuntu 22.04 内置 pip 22.0,先升 pip 再安装 (旧 pip 不识别 --break-system-packages,
              # Ubuntu 22.04 也没启用 PEP 668,所以不需要这个标志)
              python3 -m pip install --upgrade pip
              # psutil:让 ORT build.py 自动估算 nvcc 并发 (没装会警告并限到单线程)
              python3 -m pip install "cmake>=3.28,<4" "numpy<2" psutil

              # GHA 标准 runner 7 GB 内存,并行度限 2 防 OOM (CUDA 编译单线程峰值 3~4 GB)
              # 用 --parallel 2 (而不是 --parallel 默认无限),既快又不会 OOM kill
              python3 tools/ci_build/build.py \
                --build_dir build \
                --config ${{ inputs.build_type }} \
                --use_cuda \
                --cuda_home /usr/local/cuda \
                --cudnn_home /usr/lib/x86_64-linux-gnu \
                --parallel 2 \
                --nvcc_threads 1 \
                --build_shared_lib \
                --skip_tests \
                --skip_submodule_sync \
                --compile_no_warning_as_error \
                --allow_running_as_root \
                --cmake_extra_defines \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_BENCHMARKS=OFF
            '

      # ---- Linux x64 ROCm/MIGraphX (in rocm/dev container) ----
      # ORT 1.25 起完全删除了 --use_rocm 标志 (issue #26801),
      # AMD GPU 加速必须通过 --use_migraphx 路径 (MIGraphX 是 AMD 的 ML 框架,基于 ROCm)。
      # rocm/dev-ubuntu-22.04:*-complete 容器自带 MIGraphX,无需额外装。
      - name: Free disk space (Linux ROCm — 镜像 ~25 GB)
        if: matrix.platform == 'linux' && matrix.ep == 'rocm'
        shell: bash
        run: |
          # GHA 标准 runner 默认 14 GB 空闲, ROCm complete 镜像 25+ GB 装不下
          echo ">>> Disk before:"
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune -af || true
          sudo apt-get clean
          echo ">>> Disk after:"
          df -h /

      - name: Build (Linux x64 ROCm/MIGraphX, in container)
        if: matrix.platform == 'linux' && matrix.ep == 'rocm'
        shell: bash
        run: |
          docker run --rm --user root \
            -v "$(pwd):/work" -w /work \
            -e ORT_VERSION="${{ env.ORT_VERSION }}" \
            "${{ matrix.docker }}" \
            bash -c '
              set -ex
              # git "dubious ownership" — 容器内 root 跑挂载的 host 目录,git 会拒
              git config --global --add safe.directory "*" || true

              apt-get update -y
              apt-get install -y --no-install-recommends \
                build-essential ninja-build pkg-config \
                libssl-dev libcurl4-openssl-dev zlib1g-dev \
                python3 python3-pip python3-dev \
                protobuf-compiler libprotobuf-dev \
                git ca-certificates
              python3 -m pip install --upgrade pip
              python3 -m pip install "cmake>=3.28,<4" "numpy<2" psutil

              # 试多种 migraphx 包名 (-complete 不一定带 dev headers)
              apt-get install -y migraphx-dev || true
              apt-get install -y migraphx || true
              apt-get install -y libmigraphx-dev || true
              apt-get install -y rocm-dev rocm-llvm rocm-runtime || true

              # 检查 headers 是否真的装上了
              echo ">>> 查 migraphx headers:"
              find /opt/rocm -name "version.h" -path "*migraphx*" 2>/dev/null | head -5
              find /opt/rocm -name "migraphx.h" 2>/dev/null | head -5
              echo ">>> /opt/rocm/include/ 顶层目录:"
              ls /opt/rocm/include/ 2>/dev/null | head -30

              # 如果 migraphx headers 还不在,从 GitHub 下载并解压源码 headers
              if [ ! -f /opt/rocm/include/migraphx/version.h ]; then
                echo "::warning::migraphx headers 系统包没装好,从 GitHub 拉源码 headers"
                cd /tmp
                # ROCm 6.2.x 对应 MIGraphX rocm-6.2.4 tag (跟容器 ROCm 版本一致)
                git clone --depth 1 --branch rocm-6.2.4 https://github.com/ROCm/AMDMIGraphX.git || \
                  git clone --depth 1 https://github.com/ROCm/AMDMIGraphX.git
                # 把 src/include 软链到 /opt/rocm/include
                mkdir -p /opt/rocm/include
                if [ -d AMDMIGraphX/src/include/migraphx ]; then
                  cp -rn AMDMIGraphX/src/include/migraphx /opt/rocm/include/ || true
                  echo ">>> 已 cp migraphx headers 到 /opt/rocm/include/migraphx"
                fi
                cd /work
              fi

              ls /opt/rocm/include/migraphx/version.h 2>/dev/null \
                && echo "✅ migraphx/version.h found" \
                || (echo "::error::migraphx headers 仍然缺失,跳过 ROCm build"; exit 0)

              python3 tools/ci_build/build.py \
                --build_dir build \
                --config ${{ inputs.build_type }} \
                --use_migraphx \
                --migraphx_home /opt/rocm \
                --parallel 2 \
                --build_shared_lib \
                --skip_tests \
                --skip_submodule_sync \
                --compile_no_warning_as_error \
                --allow_running_as_root \
                --cmake_extra_defines \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_BENCHMARKS=OFF \
                  CMAKE_INCLUDE_PATH=/opt/rocm/include
            '

      # ---- Linux x64 OpenVINO (在 openvino/ubuntu22_dev:2025.4.1 容器内) ----
      # 该镜像默认非 root user (uid 1000),sudo 需要密码。
      # 加 --user root 直接以 root 身份运行容器,apt-get install 才能装系统包。
      - name: Build (Linux x64 OpenVINO, in container)
        if: matrix.platform == 'linux' && matrix.ep == 'openvino'
        shell: bash
        run: |
          docker run --rm --user root \
            -v "$(pwd):/work" -w /work \
            -e ORT_VERSION="${{ env.ORT_VERSION }}" \
            "${{ matrix.docker }}" \
            bash -c '
              set -ex
              git config --global --add safe.directory "*" || true

              apt-get update -y
              # gcc 11+ 才有完整 <charconv>::from_chars (整数和浮点),
              # OpenVINO container 默认 gcc 9,ORT 1.25 用了新的 from_chars overload 编不过。
              apt-get install -y --no-install-recommends \
                build-essential ninja-build pkg-config \
                gcc-11 g++-11 \
                libssl-dev libcurl4-openssl-dev zlib1g-dev \
                python3 python3-pip python3-dev \
                protobuf-compiler libprotobuf-dev \
                git ca-certificates
              update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100 \
                --slave /usr/bin/g++ g++ /usr/bin/g++-11 \
                --slave /usr/bin/gcov gcov /usr/bin/gcov-11
              update-alternatives --auto gcc
              gcc --version
              python3 -m pip install --upgrade pip
              python3 -m pip install "cmake>=3.28,<4" "numpy<2" psutil

              # 镜像里 OpenVINO 路径定位 (Intel 通常装 /opt/intel/openvino 或 /opt/intel/openvino_2025)
              OV_ROOT=""
              for cand in /opt/intel/openvino /opt/intel/openvino_2025 /opt/intel/openvino_2025.4 /opt/intel/openvino_2025.4.1; do
                if [ -d "$cand" ] && [ -f "$cand/setupvars.sh" ]; then
                  OV_ROOT="$cand"
                  break
                fi
              done
              if [ -z "$OV_ROOT" ]; then
                echo "::error::OpenVINO 在容器内找不到"
                ls -la /opt/intel/ 2>/dev/null
                exit 1
              fi
              echo ">>> OpenVINO root: $OV_ROOT"
              source "$OV_ROOT/setupvars.sh"
              echo "INTEL_OPENVINO_DIR=$INTEL_OPENVINO_DIR"

              # --parallel 2 限并行避免 OOM (GHA 7GB 内存,OpenVINO build 单文件峰值~3GB)
              python3 tools/ci_build/build.py \
                --build_dir build \
                --config ${{ inputs.build_type }} \
                --use_openvino CPU \
                --parallel 2 \
                --build_shared_lib \
                --skip_tests \
                --skip_submodule_sync \
                --compile_no_warning_as_error \
                --allow_running_as_root \
                --cmake_extra_defines \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_BENCHMARKS=OFF
            '

      # ---- Linux CPU (x64 + arm64 同一段:ubuntu:18.04 / arm64v8/ubuntu:18.04 容器) ----
      # 跟 OpenCvSharp 4.10.0 完全对齐 — glibc 2.27 floor:
      #   覆盖 Ubuntu 18.04+ / 中标麒麟 V7 / 银河麒麟 V10 / 统信 UOS V20 / Anolis 8 / RHEL 7+
      # 18.04 自带 gcc 7,需要从 ubuntu-toolchain-r PPA 装 gcc-11 (ORT 1.25 要 C++20 with from_chars)
      # 18.04 自带 Python 3.6,需要从 deadsnakes PPA 装 Python 3.10 (build.py 需要 3.8+)
      - name: Build (Linux CPU ubuntu:18.04, in container)
        if: matrix.platform == 'linux' && matrix.ep == 'cpu'
        shell: bash
        run: |
          docker run --rm --user root \
            -v "$(pwd):/work" -w /work \
            -e ORT_VERSION="${{ env.ORT_VERSION }}" \
            -e DEBIAN_FRONTEND=noninteractive \
            -e TZ=UTC \
            "${{ matrix.docker }}" \
            bash -c '
              set -ex
              git config --global --add safe.directory "*" || true

              # 基础 + ubuntu-toolchain-r PPA (gcc 11) + deadsnakes PPA (Python 3.10 base only)
              apt-get update -y
              apt-get install -y --no-install-recommends \
                ca-certificates gnupg software-properties-common \
                wget curl git make pkg-config \
                libssl-dev libcurl4-openssl-dev zlib1g-dev
              add-apt-repository -y ppa:ubuntu-toolchain-r/test
              add-apt-repository -y ppa:deadsnakes/ppa
              apt-get update -y
              # deadsnakes 已不为 bionic 提供 python3.10 (2024 起 dropped)。
              # ORT 1.25 build.py 要 Python 3.8+,bionic deadsnakes 还有 python3.9 + dev/distutils/venv。
              apt-get install -y --no-install-recommends \
                gcc-11 g++-11 \
                python3.9 python3.9-dev python3.9-distutils python3.9-venv
              update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 100 \
                --slave /usr/bin/g++ g++ /usr/bin/g++-11 \
                --slave /usr/bin/gcov gcov /usr/bin/gcov-11
              update-alternatives --auto gcc

              # python3.9 + pip — get-pip.py 通用版已弃 3.8,需用 version-specific URL
              curl -sS https://bootstrap.pypa.io/pip/3.8/get-pip.py | python3.9
              python3.9 -m pip install --upgrade pip setuptools wheel
              python3.9 -m pip install "cmake>=3.28,<4" "numpy<2" psutil
              # 把 python3.9 设为默认 python3 (build.py 默认用 python3)
              update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.9 100
              python3 --version
              gcc --version
              cmake --version

              # protobuf 让 ORT 自带的 vendored 版编 (老 ubuntu 系统包太旧)
              # 链 libstdc++ 静态,让生成的 .so 在没有 PPA libstdc++ 的客户机器也能加载
              python3 tools/ci_build/build.py \
                --build_dir build \
                --config ${{ inputs.build_type }} \
                --parallel 2 \
                --build_shared_lib \
                --skip_tests \
                --skip_submodule_sync \
                --compile_no_warning_as_error \
                --allow_running_as_root \
                --cmake_extra_defines \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_BENCHMARKS=OFF \
                  CMAKE_CXX_FLAGS="-static-libstdc++ -static-libgcc"
            '

      # ============================================================
      # 6. Verify (per-platform)
      # ============================================================
      - name: Verify - Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $cfg = "${{ inputs.build_type }}"
          $outDir = "build\$cfg\$cfg"
          if (-not (Test-Path $outDir)) { $outDir = "build\$cfg" }
          $main = Get-ChildItem -Path $outDir -Filter "onnxruntime.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $main) {
            Write-Host "::error::onnxruntime.dll not found"
            Get-ChildItem -Path $outDir -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Write-Host "✅ onnxruntime.dll: $($main.FullName) ($($main.Length) bytes)"

          if ("${{ matrix.ep }}" -eq "dml") {
            $dml = Get-ChildItem -Path "build" -Recurse -Filter "DirectML.dll" -ErrorAction SilentlyContinue
            if (-not $dml) { Write-Host "::error::DirectML.dll missing"; exit 1 }
            Write-Host "✅ DirectML.dll candidates:"
            $dml | ForEach-Object { Write-Host "   $($_.FullName) ($($_.Length) bytes)" }
          }

      - name: Verify - macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          FILE="build/${{ inputs.build_type }}/libonnxruntime.dylib"
          [ -f "$FILE" ] || (echo "::error::missing $FILE"; ls -la build/${{ inputs.build_type }}/; exit 1)
          ls -lh "$FILE"

          lipo -info "$FILE" | grep -q "${{ matrix.arch }}" \
            || (echo "::error::arch mismatch"; exit 1)

          MINOS=$(otool -l "$FILE" | awk '
            $1=="cmd" && $2=="LC_BUILD_VERSION" { in_blk=1 }
            in_blk && $1=="minos" { print $2; exit }')
          if [ -z "$MINOS" ]; then
            MINOS=$(otool -l "$FILE" | awk '
              $1=="cmd" && $2=="LC_VERSION_MIN_MACOSX" { in_blk=1 }
              in_blk && $1=="version" { print $2; exit }')
          fi
          [ "$MINOS" = "${{ matrix.deploy_target }}" ] \
            || (echo "::error::minos mismatch got=$MINOS expected=${{ matrix.deploy_target }}"; exit 1)
          echo "✅ arch + minos OK"

          # to_chars 浮点符号扫描
          LEAKED=$(nm -u "$FILE" 2>/dev/null \
            | grep -E "to_chars.*[^io]+(d|f|e)$|__ZNKSt6chrono" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::FP std::to_chars symbol leaked (will crash on macOS < 13.4):"
            echo "$LEAKED"
            exit 1
          fi
          echo "✅ no FP to_chars symbols leaked"

      - name: Verify - Linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          FILE="build/${{ inputs.build_type }}/libonnxruntime.so"
          [ -f "$FILE" ] || (echo "::error::missing $FILE"; ls -la build/${{ inputs.build_type }}/; exit 1)
          ls -lh "$FILE"

          # glibc 版本检查
          MAX_GLIBC=$(objdump -T "$FILE" 2>/dev/null \
            | grep -oE "GLIBC_[0-9]+\.[0-9]+" \
            | sort -u | sort -t_ -k2 -V | tail -1 || echo "GLIBC_unknown")
          echo ">>> Highest GLIBC dependency in libonnxruntime.so: $MAX_GLIBC"

          # 列出依赖
          echo ">>> Direct DT_NEEDED:"
          readelf -d "$FILE" | grep NEEDED || true

          # ep 特定检查
          if [ "${{ matrix.ep }}" = "cuda" ]; then
            CUDA_PROV="build/${{ inputs.build_type }}/libonnxruntime_providers_cuda.so"
            [ -f "$CUDA_PROV" ] || (echo "::error::CUDA provider missing"; exit 1)
            echo "✅ CUDA EP: $(ls -lh $CUDA_PROV)"
          fi
          if [ "${{ matrix.ep }}" = "rocm" ]; then
            # ORT 1.25 通过 --use_migraphx 路径,产物是 libonnxruntime_providers_migraphx.so
            MIGX_PROV="build/${{ inputs.build_type }}/libonnxruntime_providers_migraphx.so"
            [ -f "$MIGX_PROV" ] || (echo "::error::MIGraphX provider missing"; exit 1)
            echo "✅ MIGraphX (AMD/ROCm) EP: $(ls -lh $MIGX_PROV)"
          fi
          if [ "${{ matrix.ep }}" = "openvino" ]; then
            OV_PROV="build/${{ inputs.build_type }}/libonnxruntime_providers_openvino.so"
            [ -f "$OV_PROV" ] || (echo "::error::OpenVINO provider missing"; exit 1)
            echo "✅ OpenVINO EP: $(ls -lh $OV_PROV)"
          fi

      # ============================================================
      # 7. Organize artifacts (per-platform)
      # ============================================================
      - name: Organize artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $cfg = "${{ inputs.build_type }}"
          $outDir = "build\$cfg\$cfg"
          if (-not (Test-Path $outDir)) { $outDir = "build\$cfg" }
          New-Item -ItemType Directory -Force artifacts | Out-Null

          Get-ChildItem -Path $outDir -Filter "onnxruntime*.dll" |
            ForEach-Object { Copy-Item $_.FullName "artifacts\" -Force }

          # DirectML.dll: 从 build 目录里捞出来,跟 onnxruntime.dll 同源 ship
          $dml = Get-ChildItem -Path "build" -Recurse -Filter "DirectML.dll" -ErrorAction SilentlyContinue |
                 Sort-Object Length -Descending | Select-Object -First 1
          $dmlInfo = "DirectML.dll: (none — CPU build)"
          if ($dml) {
            Copy-Item $dml.FullName "artifacts\" -Force
            $dmlVer = (Get-Item "artifacts\DirectML.dll").VersionInfo.FileVersion
            $dmlInfo = "DirectML.dll: $dmlVer"
            Write-Host "✅ Bundled DirectML.dll v$dmlVer from $($dml.FullName)"
          } elseif ("${{ matrix.ep }}" -eq "dml") {
            Write-Host "::error::DML build but DirectML.dll missing"; exit 1
          }

          if ("${{ inputs.build_type }}" -eq "RelWithDebInfo") {
            Get-ChildItem -Path $outDir -Filter "onnxruntime*.pdb" -ErrorAction SilentlyContinue |
              ForEach-Object { Copy-Item $_.FullName "artifacts\" -Force }
          }

          @"
          ORT Version: $env:ORT_VERSION
          Platform:    Windows
          Arch:        ${{ matrix.arch }}
          EP:          ${{ matrix.ep }}
          $dmlInfo
          Runner:      ${{ matrix.runner }}
          Build Type:  ${{ inputs.build_type }}
          "@ | Out-File "artifacts\version.txt" -Encoding utf8

          Get-ChildItem artifacts | Format-Table Name, Length -AutoSize

      - name: Organize artifacts (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p artifacts
          cp "build/${{ inputs.build_type }}/libonnxruntime.dylib" artifacts/
          if [ -f "build/${{ inputs.build_type }}/libonnxruntime_providers_coreml.dylib" ]; then
            cp "build/${{ inputs.build_type }}/libonnxruntime_providers_coreml.dylib" artifacts/
          fi
          cat > artifacts/version.txt <<EOF
          ORT Version: $ORT_VERSION
          Platform:    macOS
          Arch:        ${{ matrix.arch }}
          EP:          ${{ matrix.ep }}
          MinOS:       ${{ matrix.deploy_target }}
          Runner:      ${{ matrix.runner }}
          Build Type:  ${{ inputs.build_type }}
          EOF
          ls -lh artifacts/

      - name: Organize artifacts (Linux) — bundle transitive deps via ldd
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p artifacts
          cp "build/${{ inputs.build_type }}/libonnxruntime.so" artifacts/
          for f in build/${{ inputs.build_type }}/libonnxruntime_providers_*.so; do
            [ -f "$f" ] && cp "$f" artifacts/
          done

          # ──────────────────────────────────────────────────────────────
          # 通用 ldd 传递依赖打包器:
          #   - 入口: artifacts/ 里所有 .so
          #   - 迭代 ldd,把所有非系统、非驱动的 .so 复制到 artifacts/
          #   - 排除项 (客户机器必须自己提供的):
          #       glibc 系列: libc/libm/libdl/libpthread/librt/libresolv/libutil/libcrypt/ld-linux*
          #       内核/VDSO: linux-vdso/linux-gate
          #       GCC runtime: libgcc_s/libstdc++ (用户系统都有)
          #       GPU 内核驱动 / userland 接驱动:
          #         NVIDIA: libcuda.so / libnvidia-* (随 NVIDIA driver 一起,不能我们 ship)
          #         AMD:    libdrm_amdgpu / libdrm  (随 amdgpu driver)
          #         Intel:  libze_loader / libze_intel_gpu (随 Intel GPU 用户态)
          # ──────────────────────────────────────────────────────────────

          BUNDLER=$(cat <<'BUNDLER_EOF'
          set -e
          ARTIFACTS_DIR="/work/artifacts"
          SEEN=$(mktemp)
          for f in "$ARTIFACTS_DIR"/*.so*; do
            [ -e "$f" ] && echo "$(basename "$f")" >> "$SEEN"
          done

          should_skip() {
            case "$1" in
              ld-linux-*|libc.so.*|libm.so.*|libdl.so.*|libpthread.so.*) return 0 ;;
              librt.so.*|libresolv.so.*|libutil.so.*|libnsl.so.*|libcrypt.so.*) return 0 ;;
              linux-vdso.so.*|linux-gate.so.*) return 0 ;;
              libgcc_s.so.*|libstdc++.so.*) return 0 ;;
              # 驱动相关 (客户必装,不打包)
              libcuda.so.*|libnvidia-*) return 0 ;;
              libdrm.so.*|libdrm_amdgpu.so.*|libdrm_radeon.so.*) return 0 ;;
              libze_loader.so.*|libze_intel_gpu.so.*) return 0 ;;
              # X11/系统 GUI
              libX11.so.*|libxcb.so.*|libGL.so.*|libEGL.so.*|libGLX.so.*) return 0 ;;
            esac
            return 1
          }

          # 多轮迭代直到没新依赖
          ROUND=0
          while true; do
            ROUND=$((ROUND + 1))
            ADDED=0
            for f in "$ARTIFACTS_DIR"/*.so*; do
              [ -e "$f" ] || continue
              ldd "$f" 2>/dev/null | awk '/=>/ {print $3}' | while read -r dep; do
                [ -z "$dep" ] && continue
                [ ! -f "$dep" ] && continue
                base=$(basename "$dep")
                should_skip "$base" && continue
                if ! grep -qx "$base" "$SEEN"; then
                  cp "$dep" "$ARTIFACTS_DIR/" && \
                    echo "  [round $ROUND] +$base ($(stat -c %s "$dep") bytes)"
                  echo "$base" >> "$SEEN"
                fi
              done
            done
            CUR=$(wc -l < "$SEEN")
            [ "$CUR" -eq "${PREV:-0}" ] && break
            PREV=$CUR
          done

          echo ">>> Bundled $(ls "$ARTIFACTS_DIR"/*.so* 2>/dev/null | wc -l) shared libraries"
          BUNDLER_EOF
          )

          # 所有 Linux 档现在都有 docker (cuda/rocm/openvino/cpu/arm64-cpu),
          # 统一在容器内跑 BUNDLER,LD_LIBRARY_PATH + ldd 路径都准
          docker run --rm --user root -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
            bash -c "$BUNDLER"

          # GPU EP 必须把 plugin / 运行时插件单独捞出来 (dlopen 不走 ldd)
          if [ "${{ matrix.ep }}" = "cuda" ]; then
            # cuDNN 的所有子模块 (graph/cnn/adv/heuristic/engines_*) 都是 dlopen 的
            docker run --rm --user root -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
              bash -c '
                for sub in libcudnn_graph libcudnn_cnn libcudnn_adv libcudnn_ops \
                           libcudnn_heuristic libcudnn_engines_precompiled libcudnn_engines_runtime_compiled; do
                  find /usr/local/cuda /usr/lib/x86_64-linux-gnu -name "${sub}.so*" 2>/dev/null \
                    | head -3 | xargs -I{} cp -n {} /work/artifacts/ 2>/dev/null || true
                done
                # 必要的 stub: cuda.so (driver stub for link, NOT for runtime!)
                # 不打包 libcuda.so, 客户端必须有 NVIDIA driver
              '
          fi
          if [ "${{ matrix.ep }}" = "rocm" ]; then
            docker run --rm --user root -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
              bash -c '
                # MIGraphX + ROCm backend 都是 dlopen,显式抓取
                for lib in libmigraphx.so libmigraphx_c.so libmigraphx_onnx.so \
                           libamd_comgr.so libhipfft.so librocfft.so libroctx64.so \
                           librocm_smi64.so librocrand.so libhipsparse.so libhipblas.so; do
                  find /opt/rocm -name "${lib}*" 2>/dev/null | head -2 | xargs -I{} cp -n {} /work/artifacts/ 2>/dev/null || true
                done
              '
          fi
          if [ "${{ matrix.ep }}" = "openvino" ]; then
            docker run --rm --user root -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
              bash -c '
                # 容器内定位 OpenVINO 安装路径
                OV_ROOT=""
                for cand in /opt/intel/openvino /opt/intel/openvino_2025 /opt/intel/openvino_2025.4 /opt/intel/openvino_2025.4.1; do
                  [ -d "$cand" ] && [ -f "$cand/setupvars.sh" ] && OV_ROOT="$cand" && break
                done
                if [ -z "$OV_ROOT" ]; then
                  echo "::warning::OpenVINO 路径在容器内找不到,plugin 可能漏抓"
                  exit 0
                fi
                LIB="$OV_ROOT/runtime/lib/intel64"
                # OpenVINO plugins.xml + Intel plugins + frontend 都是 dlopen 的,ldd 抓不到
                cp -n "$LIB/plugins.xml" /work/artifacts/ 2>/dev/null || true
                cp -n "$LIB"/libopenvino_intel_*_plugin.so* /work/artifacts/ 2>/dev/null || true
                cp -n "$LIB"/libopenvino_*_frontend.so* /work/artifacts/ 2>/dev/null || true
                cp -n "$LIB"/libopenvino_auto_*plugin.so* /work/artifacts/ 2>/dev/null || true
                cp -n "$LIB"/libopenvino_hetero_plugin.so* /work/artifacts/ 2>/dev/null || true
                # TBB threading runtime
                TBB="$OV_ROOT/runtime/3rdparty/tbb/lib"
                [ -d "$TBB" ] && cp -n "$TBB"/libtbb.so* "$TBB"/libtbbmalloc.so* /work/artifacts/ 2>/dev/null || true
              '
          fi

          # 自动扫描所有 artifact .so 的最高 GLIBC 依赖版本 (取联合上界)
          GLIBC_FLOOR=$(for f in artifacts/*.so*; do
              [ -f "$f" ] && objdump -T "$f" 2>/dev/null \
                | grep -oE "GLIBC_[0-9]+\.[0-9]+";
            done | sort -u | sort -t_ -k2 -V | tail -1 || echo "unknown")

          # 客户端硬性要求 (.so 不打包的部分) + 兼容 OS 列表
          if [ "${{ matrix.ep }}" = "cuda" ]; then
            CLIENT_REQUIRES="NVIDIA driver >= 525 (libcuda.so) — 不在 artifact 里"
            OS_COMPAT="Ubuntu 22.04+ / Kylin V10 SP3+ / 任何 glibc>=2.35 + NVIDIA driver"
          elif [ "${{ matrix.ep }}" = "rocm" ]; then
            CLIENT_REQUIRES="amdgpu kernel module + libdrm_amdgpu — 不在 artifact 里"
            OS_COMPAT="Ubuntu 22.04+ / 任何 glibc>=2.35 + amdgpu driver"
          elif [ "${{ matrix.ep }}" = "openvino" ]; then
            CLIENT_REQUIRES="(可选) Intel GPU 驱动 (i915/Xe kmod) 用于 GPU 推理"
            OS_COMPAT="Ubuntu 22.04+ / Kylin V10 SP3+ / 任何 glibc>=2.35"
          else
            CLIENT_REQUIRES="无 (CPU only,零外部依赖)"
            if [ "${{ matrix.arch }}" = "x64" ]; then
              OS_COMPAT="银河麒麟 V10 SP1+ x64 / 统信 UOS V20 / Anolis 8 / RHEL 8 / Ubuntu 20.04+ (任何 glibc>=2.28)"
            else
              OS_COMPAT="银河麒麟 V10 SP1+ aarch64 / 飞腾桌面 / 鲲鹏桌面 (任何 aarch64 glibc>=2.28)"
            fi
          fi

          cat > artifacts/version.txt <<EOF
          ORT Version:     $ORT_VERSION
          Platform:        Linux
          Arch:            ${{ matrix.arch }}
          EP:              ${{ matrix.ep }}
          glibc Floor:     $GLIBC_FLOOR
          OS Compatibility: $OS_COMPAT
          Container:       ${{ matrix.docker }}
          Runner:          ${{ matrix.runner }}
          Build Type:      ${{ inputs.build_type }}

          Bundled libs:    $(ls artifacts/*.so* 2>/dev/null | wc -l) files
          Total size:      $(du -sh artifacts/ | awk '{print $1}')
          Client requires: $CLIENT_REQUIRES
          EOF

          echo ">>> Final artifacts:"
          ls -lh artifacts/
          echo ">>> Total size:"
          du -sh artifacts/

      # ============================================================
      # 8. Smoke load test
      # ============================================================
      - name: Smoke load (Windows x64)
        if: matrix.platform == 'windows' && matrix.arch != 'arm64'
        shell: pwsh
        run: |
          $dll = "artifacts\onnxruntime.dll"
          python -c "import ctypes; lib = ctypes.CDLL(r'$dll'); fn = lib.OrtGetApiBase; fn.restype = ctypes.c_void_p; print('OrtGetApiBase =', hex(fn()))"

      - name: Smoke load (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          FILE="artifacts/libonnxruntime.dylib"
          python3 -c "
          import ctypes, os, sys
          lib = ctypes.CDLL('$FILE')
          fn = lib.OrtGetApiBase; fn.restype = ctypes.c_void_p
          ptr = fn()
          assert ptr, 'OrtGetApiBase returned NULL'
          print(f'✅ OrtGetApiBase = {hex(ptr)}')
          "

      - name: Smoke load (Linux container)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          docker run --rm --user root -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
            bash -c '
              # 容器里有 python 用容器的,没 python 用 ldd 兜底
              if command -v python3 >/dev/null 2>&1; then
                python3 -c "
          import ctypes
          lib = ctypes.CDLL(\"/work/artifacts/libonnxruntime.so\")
          fn = lib.OrtGetApiBase; fn.restype = ctypes.c_void_p
          assert fn(), \"OrtGetApiBase returned NULL\"
          print(\"✅ OrtGetApiBase loaded\")
          "
              else
                ldd /work/artifacts/libonnxruntime.so | head -20
                echo "✅ ldd shows libonnxruntime.so resolves"
              fi
            '

      # ============================================================
      # 9. Upload
      # ============================================================
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          retention-days: 90
