name: Build ORT 1.25.0 Desktop (Win + Mac + Linux, full GPU/iGPU/CPU)

# 目的：
#   一个 workflow 一次性产出三平台桌面端 ORT v1.25.0 native 二进制。
#   覆盖 GPU + iGPU + CPU,不含服务器场景 (Ascend/海光DCU/Instinct 等服务器加速卡不做)。
#
# 平台 / EP 完整覆盖矩阵：
#   ┌─────────────────────────┬──────────────┬──────────────────┬──────────────┬───────────┐
#   │ Target                  │ OS Floor     │ GPU 覆盖         │ EP           │ glibc     │
#   ├─────────────────────────┼──────────────┼──────────────────┼──────────────┼───────────┤
#   │ win-x64-dml             │ Win 10 1903  │ NV/AMD/Intel/iGPU│ DML + CPU    │ —         │
#   │ win-arm64-dml           │ Win 10 1903  │ Snapdragon Adreno│ DML + CPU    │ —         │
#   │ osx-x64-coreml          │ macOS 10.15  │ AMD Pro/Intel iGPU│ CoreML + CPU│ —         │
#   │ osx-arm64-coreml        │ macOS 11.0   │ Apple GPU + ANE  │ CoreML + CPU │ —         │
#   │ linux-x64-cuda          │ Ubuntu 22.04 │ NVIDIA dGPU      │ CUDA + CPU   │ 2.35      │
#   │ linux-x64-rocm          │ Ubuntu 22.04 │ AMD Radeon dGPU  │ ROCm + CPU   │ 2.35      │
#   │ linux-x64-openvino      │ Ubuntu 22.04 │ Intel iGPU/Arc   │ OpenVINO+CPU │ 2.35      │
#   │ linux-x64-cpu           │ manylinux_2_28│—                │ CPU          │ 2.28      │
#   │ linux-arm64-cpu         │ manylinux_2_28│—                │ CPU          │ 2.28      │
#   └─────────────────────────┴──────────────┴──────────────────┴──────────────┴───────────┘
#
# Linux glibc 策略:
#   - CPU 档 (x64 + arm64) 都用 manylinux_2_28 (glibc 2.28),覆盖最广:
#       银河麒麟 V10 SP1+ (x64/aarch64) / 统信 UOS V20 / Anolis 8 / RHEL 8
#   - GPU 加速档 (cuda/rocm/openvino) 用 Ubuntu 22.04 base (glibc 2.35),
#     原因:CUDA SDK / ROCm SDK / OpenVINO 运行时本身就是针对 Ubuntu 22.04 编的,
#     强行降到 manylinux_2_28 不可行 (运行时 .so 自身就引 glibc 2.35 符号)
#   - 如果要在 V10 SP1 (glibc 2.28) 上跑 GPU 加速,客户必须升到 V10 SP3+
#     或者用 linux-x64-cpu 走 CPU 兜底 (推理慢约 3-10x 但兼容性最广)
#
# DirectML.dll "自动版本匹配" 策略：
#   ORT 编译时自动从 NuGet 拉取 DirectML.dll,跟 onnxruntime.dll 同源 ship。
#   绝对不会出现客户端 DML 版本不匹配。
#
# CUDA / cuDNN 自带:
#   linux-x64-cuda artifact 内附带 CUDA 12 cudart + cuBLAS + cuDNN 9 runtime .so,
#   客户端不需要自己装 CUDA Toolkit。
#
# ROCm 自带:
#   linux-x64-rocm artifact 内附带 ROCm 6.2 关键 runtime .so,
#   客户端只需要 AMD 驱动 + amdgpu kmod,不需要装完整 ROCm Toolkit。

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - RelWithDebInfo
      target_set:
        description: 'Which platforms to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows-only
          - macos-only
          - linux-only
          - linux-cpu-only      # 信创最稳的兜底,只要这一档
          - linux-gpu-only      # 不含 cpu/arm64,仅 GPU 加速档

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          # arch:    x64/arm64/x86_64       ORT build.py / cmake 用的 arch 名 (注意 macOS 用 x86_64)
          # ep:      dml/coreml/cuda/rocm/openvino/cpu
          # runner:  GHA 主机
          # docker:  容器 image (空表示直接在 runner 上跑)
          # deploy_target / xcode_version: 仅 macOS 用
          # artifact_name: 上传产物名

          WIN_X64_DML='{"platform":"windows","arch":"x64","ep":"dml","runner":"windows-2022","docker":"","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-win-x64-dml"}'
          WIN_ARM64_DML='{"platform":"windows","arch":"arm64","ep":"dml","runner":"windows-11-arm","docker":"","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-win-arm64-dml"}'
          MAC_X64_COREML='{"platform":"macos","arch":"x86_64","ep":"coreml","runner":"macos-15-intel","docker":"","deploy_target":"10.15","xcode_version":"","artifact_name":"onnxruntime-1.25.0-osx-x64-coreml"}'
          MAC_ARM64_COREML='{"platform":"macos","arch":"arm64","ep":"coreml","runner":"macos-14","docker":"","deploy_target":"11.0","xcode_version":"15.2","artifact_name":"onnxruntime-1.25.0-osx-arm64-coreml"}'

          # Linux 各档 (用 docker 字段控制容器)
          LINUX_X64_CUDA='{"platform":"linux","arch":"x64","ep":"cuda","runner":"ubuntu-22.04","docker":"nvidia/cuda:12.6.0-cudnn-devel-ubuntu22.04","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-x64-cuda"}'
          LINUX_X64_ROCM='{"platform":"linux","arch":"x64","ep":"rocm","runner":"ubuntu-22.04","docker":"rocm/dev-ubuntu-22.04:6.2.4-complete","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-x64-rocm"}'
          LINUX_X64_OPENVINO='{"platform":"linux","arch":"x64","ep":"openvino","runner":"ubuntu-22.04","docker":"","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-x64-openvino"}'
          LINUX_X64_CPU='{"platform":"linux","arch":"x64","ep":"cpu","runner":"ubuntu-22.04","docker":"quay.io/pypa/manylinux_2_28_x86_64","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-x64-cpu"}'
          LINUX_ARM64_CPU='{"platform":"linux","arch":"arm64","ep":"cpu","runner":"ubuntu-22.04-arm","docker":"quay.io/pypa/manylinux_2_28_aarch64","deploy_target":"","xcode_version":"","artifact_name":"onnxruntime-1.25.0-linux-arm64-cpu"}'

          case "${{ inputs.target_set }}" in
            windows-only)
              echo "matrix={\"include\":[$WIN_X64_DML,$WIN_ARM64_DML]}" >> $GITHUB_OUTPUT ;;
            macos-only)
              echo "matrix={\"include\":[$MAC_X64_COREML,$MAC_ARM64_COREML]}" >> $GITHUB_OUTPUT ;;
            linux-only)
              echo "matrix={\"include\":[$LINUX_X64_CUDA,$LINUX_X64_ROCM,$LINUX_X64_OPENVINO,$LINUX_X64_CPU,$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
            linux-cpu-only)
              echo "matrix={\"include\":[$LINUX_X64_CPU,$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
            linux-gpu-only)
              echo "matrix={\"include\":[$LINUX_X64_CUDA,$LINUX_X64_ROCM,$LINUX_X64_OPENVINO]}" >> $GITHUB_OUTPUT ;;
            *)
              echo "matrix={\"include\":[$WIN_X64_DML,$WIN_ARM64_DML,$MAC_X64_COREML,$MAC_ARM64_COREML,$LINUX_X64_CUDA,$LINUX_X64_ROCM,$LINUX_X64_OPENVINO,$LINUX_X64_CPU,$LINUX_ARM64_CPU]}" >> $GITHUB_OUTPUT ;;
          esac

  build:
    name: ${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.ep }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    env:
      ORT_VERSION: 'v1.25.0'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      # ============================================================
      # 1. Checkout (所有平台共用)
      # ============================================================
      - name: Checkout ONNX Runtime ${{ env.ORT_VERSION }}
        uses: actions/checkout@v5
        with:
          repository: microsoft/onnxruntime
          ref: ${{ env.ORT_VERSION }}
          submodules: recursive
          fetch-depth: 1

      - name: Setup Python (non-linux only)
        if: matrix.platform != 'linux'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # ============================================================
      # 2. macOS Xcode 选择
      # ============================================================
      - name: Select Xcode (macOS only)
        if: matrix.platform == 'macos' && matrix.xcode_version != ''
        shell: bash
        run: |
          sudo xcode-select --switch /Applications/Xcode_${{ matrix.xcode_version }}.app/Contents/Developer
          xcodebuild -version
          xcrun --show-sdk-version

      - name: Show default Xcode + assert chrono guard precondition (macOS x64)
        if: matrix.platform == 'macos' && matrix.xcode_version == ''
        shell: bash
        run: |
          xcodebuild -version
          xcrun --show-sdk-version
          SDK_VER=$(xcrun --show-sdk-version)
          echo ">>> Default Xcode SDK version: $SDK_VER"

          # 2 重保护:
          #   (a) deploy_target=10.15 < 13.3 → ORT_USE_CXX20_STD_CHRONO #undef
          #   (b) 即使 SDK 升到 14.4+ (Xcode 15.4+),deploy < 13.3 也兜底 undef
          # 任何一个生效都安全。这里把 deploy_target 显式 echo 出来便于排查。
          echo ">>> Deploy target: ${{ matrix.deploy_target }} (< 13.3 satisfies #undef)"

          # 同时检查 ORT 1.25 logging.cc 的 guard 还在
          F="onnxruntime/core/common/logging/logging.cc"
          if [ -f "$F" ]; then
            grep -n "ORT_USE_CXX20_STD_CHRONO" "$F" | head -3
          fi

      # ============================================================
      # 3. 安装依赖 (per-platform)
      # ============================================================
      - name: Install deps (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          pip install "cmake>=3.28,<4" "numpy<2" setuptools wheel
          cmake --version

      - name: Setup MSBuild (Windows)
        if: matrix.platform == 'windows'
        uses: microsoft/setup-msbuild@v2

      - name: Install deps (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          pip install "cmake>=3.28,<4" "numpy<2"
          if ! command -v ninja &>/dev/null; then brew install ninja; fi
          cmake --version

      - name: Install deps (Linux openvino - on host)
        if: matrix.platform == 'linux' && matrix.ep == 'openvino'
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential ninja-build pkg-config \
            libssl-dev libcurl4-openssl-dev zlib1g-dev \
            python3-pip python3-dev gnupg lsb-release wget curl \
            protobuf-compiler libprotobuf-dev
          pip3 install "cmake>=3.28,<4" "numpy<2"

          # OpenVINO 2024.6 (LTS) APT 源安装
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | sudo gpg --dearmor -o /usr/share/keyrings/intel-sw-products.gpg
          echo "deb [signed-by=/usr/share/keyrings/intel-sw-products.gpg] https://apt.repos.intel.com/openvino/2024 ubuntu22 main" \
            | sudo tee /etc/apt/sources.list.d/intel-openvino-2024.list
          sudo apt-get update -y
          sudo apt-get install -y openvino-2024.6.0
          # OpenVINO 装到 /opt/intel/openvino_2024
          ls /opt/intel/openvino_2024 || (echo "::error::OpenVINO install failed"; exit 1)
          echo "OPENVINO_ROOT=/opt/intel/openvino_2024" >> $GITHUB_ENV

      # arm64 cpu 改用 manylinux_2_28_aarch64 容器 (glibc 2.28),
      # 覆盖银河麒麟 V10 SP1 ARM / 统信 UOS V20 ARM,无需在 host 装 deps。
      # (容器内已有 gcc/g++/Python/CMake)

      # ============================================================
      # 4. macOS-only: 校验 ORT 1.25 的内置 chrono guard 是否生效
      #
      # 背景:
      #   - 1.18.1 没有 ORT_USE_CXX20_STD_CHRONO 宏,需要外部 patch ostream_sink.cc
      #     + apple_log_sink.mm 来绕过 std::to_chars (macOS 13.4+)
      #   - 1.25.0 在 logging.cc 自己加了保护:
      #         #if (SDK < 14.4) || (deploy_target < 13.3)
      #             #undef ORT_USE_CXX20_STD_CHRONO
      #         #endif
      #     若禁用 → fallback 到 date 库 (header-only, 不引 <format>),无 to_chars 依赖
      #
      # 我们的两档:
      #   - x64:   Xcode 16.x SDK 15+ (>= 14.4) ✓  但 deploy_target 10.15 < 13.3 ✗
      #   - arm64: Xcode 15.2 SDK 14.2 (< 14.4) ✗  deploy_target 11.0 < 13.3 ✗
      #
      #   两档都至少满足一个 #undef 条件,所以 ORT 1.25 自动用 date fallback,
      #   完全不需要外部 patch。我们只做 sanity check 确认 logging.cc 里有这个 guard。
      # ============================================================
      - name: Verify ORT 1.25 chrono guard (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          F="onnxruntime/core/common/logging/logging.cc"
          if ! grep -q "ORT_USE_CXX20_STD_CHRONO" "$F"; then
            echo "::error::ORT 1.25 不再有 ORT_USE_CXX20_STD_CHRONO 保护宏 — 需要重新评估 patch 策略"
            head -100 "$F"
            exit 1
          fi
          if ! grep -q "__MAC_OS_X_VERSION_MIN_REQUIRED < 130300" "$F"; then
            echo "::error::macOS deploy_target < 13.3 的保护条件没找到 — patch 策略需重写"
            grep -n -B 2 -A 5 "ORT_USE_CXX20_STD_CHRONO" "$F"
            exit 1
          fi
          echo "✅ ORT 1.25 logging.cc 自带 chrono guard,fallback 到 date 库,无需外部 patch"
          grep -n -B 2 -A 8 "TARGET_OS_MAC" "$F" | head -30

      # ============================================================
      # 5. Build (per-platform/per-EP)
      # ============================================================

      # ---- Windows ----
      - name: Build (Windows DML/CPU)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $epFlags = @()
          switch ("${{ matrix.ep }}") {
            "dml" { $epFlags += "--use_dml" }
            "cpu" { } # CPU 默认
          }
          $archFlags = @()
          if ("${{ matrix.arch }}" -eq "arm64") { $archFlags += "--arm64" }

          $allArgs = @(
            "tools/ci_build/build.py",
            "--build_dir", "build",
            "--config", "${{ inputs.build_type }}",
            "--parallel",
            "--build_shared_lib",
            "--skip_tests",
            "--skip_submodule_sync",
            "--compile_no_warning_as_error",
            "--cmake_generator", "Visual Studio 17 2022"
          )
          $allArgs += $epFlags
          $allArgs += $archFlags
          $allArgs += @("--cmake_extra_defines",
                         "onnxruntime_BUILD_UNIT_TESTS=OFF",
                         "onnxruntime_BUILD_BENCHMARKS=OFF")
          python @allArgs
          if ($LASTEXITCODE -ne 0) { throw "Build failed code=$LASTEXITCODE" }

      # ---- macOS ----
      - name: Build (macOS CoreML)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          python3 tools/ci_build/build.py \
            --build_dir build \
            --config ${{ inputs.build_type }} \
            --use_coreml \
            --parallel \
            --build_shared_lib \
            --skip_tests \
            --skip_submodule_sync \
            --compile_no_warning_as_error \
            --osx_arch ${{ matrix.arch }} \
            --cmake_extra_defines \
              CMAKE_POLICY_VERSION_MINIMUM=3.5 \
              CMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.deploy_target }} \
              CMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
              CMAKE_OSX_SYSROOT=macosx \
              onnxruntime_BUILD_UNIT_TESTS=OFF \
              onnxruntime_BUILD_BENCHMARKS=OFF

      # ---- Linux x64 CUDA (in nvidia/cuda container) ----
      - name: Build (Linux x64 CUDA, in container)
        if: matrix.platform == 'linux' && matrix.ep == 'cuda'
        shell: bash
        run: |
          docker run --rm \
            -v "$(pwd):/work" -w /work \
            -e ORT_VERSION="${{ env.ORT_VERSION }}" \
            "${{ matrix.docker }}" \
            bash -c '
              set -ex
              apt-get update -y
              apt-get install -y --no-install-recommends \
                build-essential ninja-build pkg-config \
                libssl-dev libcurl4-openssl-dev zlib1g-dev \
                python3 python3-pip python3-dev \
                protobuf-compiler libprotobuf-dev \
                git ca-certificates
              pip3 install --break-system-packages "cmake>=3.28,<4" "numpy<2"

              python3 tools/ci_build/build.py \
                --build_dir build \
                --config ${{ inputs.build_type }} \
                --use_cuda \
                --cuda_home /usr/local/cuda \
                --cudnn_home /usr/lib/x86_64-linux-gnu \
                --parallel \
                --build_shared_lib \
                --skip_tests \
                --skip_submodule_sync \
                --compile_no_warning_as_error \
                --allow_running_as_root \
                --cmake_extra_defines \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_BENCHMARKS=OFF
            '

      # ---- Linux x64 ROCm (in rocm/dev container) ----
      - name: Build (Linux x64 ROCm, in container)
        if: matrix.platform == 'linux' && matrix.ep == 'rocm'
        shell: bash
        run: |
          docker run --rm \
            -v "$(pwd):/work" -w /work \
            -e ORT_VERSION="${{ env.ORT_VERSION }}" \
            "${{ matrix.docker }}" \
            bash -c '
              set -ex
              apt-get update -y
              apt-get install -y --no-install-recommends \
                build-essential ninja-build pkg-config \
                libssl-dev libcurl4-openssl-dev zlib1g-dev \
                python3 python3-pip python3-dev \
                protobuf-compiler libprotobuf-dev \
                git ca-certificates
              pip3 install --break-system-packages "cmake>=3.28,<4" "numpy<2"

              # ROCm 已预装在 /opt/rocm
              ls /opt/rocm/ | head -10

              python3 tools/ci_build/build.py \
                --build_dir build \
                --config ${{ inputs.build_type }} \
                --use_rocm \
                --rocm_home /opt/rocm \
                --parallel \
                --build_shared_lib \
                --skip_tests \
                --skip_submodule_sync \
                --compile_no_warning_as_error \
                --allow_running_as_root \
                --cmake_extra_defines \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_BENCHMARKS=OFF
            '

      # ---- Linux x64 OpenVINO (on host, OV via apt) ----
      - name: Build (Linux x64 OpenVINO)
        if: matrix.platform == 'linux' && matrix.ep == 'openvino'
        shell: bash
        run: |
          source /opt/intel/openvino_2024/setupvars.sh
          python3 tools/ci_build/build.py \
            --build_dir build \
            --config ${{ inputs.build_type }} \
            --use_openvino CPU \
            --parallel \
            --build_shared_lib \
            --skip_tests \
            --skip_submodule_sync \
            --compile_no_warning_as_error \
            --cmake_extra_defines \
              onnxruntime_BUILD_UNIT_TESTS=OFF \
              onnxruntime_BUILD_BENCHMARKS=OFF

      # ---- Linux x64 CPU (manylinux_2_28 container, glibc 2.28 floor) ----
      - name: Build (Linux x64 CPU manylinux_2_28, in container)
        if: matrix.platform == 'linux' && matrix.arch == 'x64' && matrix.ep == 'cpu'
        shell: bash
        run: |
          docker run --rm \
            -v "$(pwd):/work" -w /work \
            -e ORT_VERSION="${{ env.ORT_VERSION }}" \
            "${{ matrix.docker }}" \
            bash -c '
              set -ex
              # manylinux_2_28 (RHEL/AlmaLinux 8) + glibc 2.28
              # 已经预装 gcc/g++/cmake/ninja/python
              /opt/python/cp311-cp311/bin/pip install "cmake>=3.28,<4" "numpy<2"
              export PATH="/opt/python/cp311-cp311/bin:$PATH"

              # protobuf 让 ORT 自带的 vendored 版编 (manylinux 容器没系统 libprotobuf)
              python3 tools/ci_build/build.py \
                --build_dir build \
                --config ${{ inputs.build_type }} \
                --parallel \
                --build_shared_lib \
                --skip_tests \
                --skip_submodule_sync \
                --compile_no_warning_as_error \
                --allow_running_as_root \
                --cmake_extra_defines \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_BENCHMARKS=OFF
            '

      # ---- Linux arm64 CPU (manylinux_2_28_aarch64 container,glibc 2.28 floor) ----
      # 与 x64 cpu 对齐,覆盖银河麒麟 V10 SP1 ARM / 飞腾 D2000 桌面 / 鲲鹏桌面
      - name: Build (Linux arm64 CPU manylinux_2_28_aarch64, in container)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64' && matrix.ep == 'cpu'
        shell: bash
        run: |
          docker run --rm \
            -v "$(pwd):/work" -w /work \
            -e ORT_VERSION="${{ env.ORT_VERSION }}" \
            "${{ matrix.docker }}" \
            bash -c '
              set -ex
              /opt/python/cp311-cp311/bin/pip install "cmake>=3.28,<4" "numpy<2"
              export PATH="/opt/python/cp311-cp311/bin:$PATH"

              python3 tools/ci_build/build.py \
                --build_dir build \
                --config ${{ inputs.build_type }} \
                --parallel \
                --build_shared_lib \
                --skip_tests \
                --skip_submodule_sync \
                --compile_no_warning_as_error \
                --allow_running_as_root \
                --cmake_extra_defines \
                  onnxruntime_BUILD_UNIT_TESTS=OFF \
                  onnxruntime_BUILD_BENCHMARKS=OFF
            '

      # ============================================================
      # 6. Verify (per-platform)
      # ============================================================
      - name: Verify - Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $cfg = "${{ inputs.build_type }}"
          $outDir = "build\$cfg\$cfg"
          if (-not (Test-Path $outDir)) { $outDir = "build\$cfg" }
          $main = Get-ChildItem -Path $outDir -Filter "onnxruntime.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $main) {
            Write-Host "::error::onnxruntime.dll not found"
            Get-ChildItem -Path $outDir -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Write-Host "✅ onnxruntime.dll: $($main.FullName) ($($main.Length) bytes)"

          if ("${{ matrix.ep }}" -eq "dml") {
            $dml = Get-ChildItem -Path "build" -Recurse -Filter "DirectML.dll" -ErrorAction SilentlyContinue
            if (-not $dml) { Write-Host "::error::DirectML.dll missing"; exit 1 }
            Write-Host "✅ DirectML.dll candidates:"
            $dml | ForEach-Object { Write-Host "   $($_.FullName) ($($_.Length) bytes)" }
          }

      - name: Verify - macOS
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          FILE="build/${{ inputs.build_type }}/libonnxruntime.dylib"
          [ -f "$FILE" ] || (echo "::error::missing $FILE"; ls -la build/${{ inputs.build_type }}/; exit 1)
          ls -lh "$FILE"

          lipo -info "$FILE" | grep -q "${{ matrix.arch }}" \
            || (echo "::error::arch mismatch"; exit 1)

          MINOS=$(otool -l "$FILE" | awk '
            $1=="cmd" && $2=="LC_BUILD_VERSION" { in_blk=1 }
            in_blk && $1=="minos" { print $2; exit }')
          if [ -z "$MINOS" ]; then
            MINOS=$(otool -l "$FILE" | awk '
              $1=="cmd" && $2=="LC_VERSION_MIN_MACOSX" { in_blk=1 }
              in_blk && $1=="version" { print $2; exit }')
          fi
          [ "$MINOS" = "${{ matrix.deploy_target }}" ] \
            || (echo "::error::minos mismatch got=$MINOS expected=${{ matrix.deploy_target }}"; exit 1)
          echo "✅ arch + minos OK"

          # to_chars 浮点符号扫描
          LEAKED=$(nm -u "$FILE" 2>/dev/null \
            | grep -E "to_chars.*[^io]+(d|f|e)$|__ZNKSt6chrono" || true)
          if [ -n "$LEAKED" ]; then
            echo "::error::FP std::to_chars symbol leaked (will crash on macOS < 13.4):"
            echo "$LEAKED"
            exit 1
          fi
          echo "✅ no FP to_chars symbols leaked"

      - name: Verify - Linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          FILE="build/${{ inputs.build_type }}/libonnxruntime.so"
          [ -f "$FILE" ] || (echo "::error::missing $FILE"; ls -la build/${{ inputs.build_type }}/; exit 1)
          ls -lh "$FILE"

          # glibc 版本检查
          MAX_GLIBC=$(objdump -T "$FILE" 2>/dev/null \
            | grep -oE "GLIBC_[0-9]+\.[0-9]+" \
            | sort -u | sort -t_ -k2 -V | tail -1 || echo "GLIBC_unknown")
          echo ">>> Highest GLIBC dependency in libonnxruntime.so: $MAX_GLIBC"

          # 列出依赖
          echo ">>> Direct DT_NEEDED:"
          readelf -d "$FILE" | grep NEEDED || true

          # ep 特定检查
          if [ "${{ matrix.ep }}" = "cuda" ]; then
            CUDA_PROV="build/${{ inputs.build_type }}/libonnxruntime_providers_cuda.so"
            [ -f "$CUDA_PROV" ] || (echo "::error::CUDA provider missing"; exit 1)
            echo "✅ CUDA EP: $(ls -lh $CUDA_PROV)"
          fi
          if [ "${{ matrix.ep }}" = "rocm" ]; then
            ROCM_PROV="build/${{ inputs.build_type }}/libonnxruntime_providers_rocm.so"
            [ -f "$ROCM_PROV" ] || (echo "::error::ROCm provider missing"; exit 1)
            echo "✅ ROCm EP: $(ls -lh $ROCM_PROV)"
          fi
          if [ "${{ matrix.ep }}" = "openvino" ]; then
            OV_PROV="build/${{ inputs.build_type }}/libonnxruntime_providers_openvino.so"
            [ -f "$OV_PROV" ] || (echo "::error::OpenVINO provider missing"; exit 1)
            echo "✅ OpenVINO EP: $(ls -lh $OV_PROV)"
          fi

      # ============================================================
      # 7. Organize artifacts (per-platform)
      # ============================================================
      - name: Organize artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $cfg = "${{ inputs.build_type }}"
          $outDir = "build\$cfg\$cfg"
          if (-not (Test-Path $outDir)) { $outDir = "build\$cfg" }
          New-Item -ItemType Directory -Force artifacts | Out-Null

          Get-ChildItem -Path $outDir -Filter "onnxruntime*.dll" |
            ForEach-Object { Copy-Item $_.FullName "artifacts\" -Force }

          # DirectML.dll: 从 build 目录里捞出来,跟 onnxruntime.dll 同源 ship
          $dml = Get-ChildItem -Path "build" -Recurse -Filter "DirectML.dll" -ErrorAction SilentlyContinue |
                 Sort-Object Length -Descending | Select-Object -First 1
          $dmlInfo = "DirectML.dll: (none — CPU build)"
          if ($dml) {
            Copy-Item $dml.FullName "artifacts\" -Force
            $dmlVer = (Get-Item "artifacts\DirectML.dll").VersionInfo.FileVersion
            $dmlInfo = "DirectML.dll: $dmlVer"
            Write-Host "✅ Bundled DirectML.dll v$dmlVer from $($dml.FullName)"
          } elseif ("${{ matrix.ep }}" -eq "dml") {
            Write-Host "::error::DML build but DirectML.dll missing"; exit 1
          }

          if ("${{ inputs.build_type }}" -eq "RelWithDebInfo") {
            Get-ChildItem -Path $outDir -Filter "onnxruntime*.pdb" -ErrorAction SilentlyContinue |
              ForEach-Object { Copy-Item $_.FullName "artifacts\" -Force }
          }

          @"
          ORT Version: $env:ORT_VERSION
          Platform:    Windows
          Arch:        ${{ matrix.arch }}
          EP:          ${{ matrix.ep }}
          $dmlInfo
          Runner:      ${{ matrix.runner }}
          Build Type:  ${{ inputs.build_type }}
          "@ | Out-File "artifacts\version.txt" -Encoding utf8

          Get-ChildItem artifacts | Format-Table Name, Length -AutoSize

      - name: Organize artifacts (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p artifacts
          cp "build/${{ inputs.build_type }}/libonnxruntime.dylib" artifacts/
          if [ -f "build/${{ inputs.build_type }}/libonnxruntime_providers_coreml.dylib" ]; then
            cp "build/${{ inputs.build_type }}/libonnxruntime_providers_coreml.dylib" artifacts/
          fi
          cat > artifacts/version.txt <<EOF
          ORT Version: $ORT_VERSION
          Platform:    macOS
          Arch:        ${{ matrix.arch }}
          EP:          ${{ matrix.ep }}
          MinOS:       ${{ matrix.deploy_target }}
          Runner:      ${{ matrix.runner }}
          Build Type:  ${{ inputs.build_type }}
          EOF
          ls -lh artifacts/

      - name: Organize artifacts (Linux) — bundle transitive deps via ldd
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p artifacts
          cp "build/${{ inputs.build_type }}/libonnxruntime.so" artifacts/
          for f in build/${{ inputs.build_type }}/libonnxruntime_providers_*.so; do
            [ -f "$f" ] && cp "$f" artifacts/
          done

          # ──────────────────────────────────────────────────────────────
          # 通用 ldd 传递依赖打包器:
          #   - 入口: artifacts/ 里所有 .so
          #   - 迭代 ldd,把所有非系统、非驱动的 .so 复制到 artifacts/
          #   - 排除项 (客户机器必须自己提供的):
          #       glibc 系列: libc/libm/libdl/libpthread/librt/libresolv/libutil/libcrypt/ld-linux*
          #       内核/VDSO: linux-vdso/linux-gate
          #       GCC runtime: libgcc_s/libstdc++ (用户系统都有)
          #       GPU 内核驱动 / userland 接驱动:
          #         NVIDIA: libcuda.so / libnvidia-* (随 NVIDIA driver 一起,不能我们 ship)
          #         AMD:    libdrm_amdgpu / libdrm  (随 amdgpu driver)
          #         Intel:  libze_loader / libze_intel_gpu (随 Intel GPU 用户态)
          # ──────────────────────────────────────────────────────────────

          BUNDLER=$(cat <<'BUNDLER_EOF'
          set -e
          ARTIFACTS_DIR="/work/artifacts"
          SEEN=$(mktemp)
          for f in "$ARTIFACTS_DIR"/*.so*; do
            [ -e "$f" ] && echo "$(basename "$f")" >> "$SEEN"
          done

          should_skip() {
            case "$1" in
              ld-linux-*|libc.so.*|libm.so.*|libdl.so.*|libpthread.so.*) return 0 ;;
              librt.so.*|libresolv.so.*|libutil.so.*|libnsl.so.*|libcrypt.so.*) return 0 ;;
              linux-vdso.so.*|linux-gate.so.*) return 0 ;;
              libgcc_s.so.*|libstdc++.so.*) return 0 ;;
              # 驱动相关 (客户必装,不打包)
              libcuda.so.*|libnvidia-*) return 0 ;;
              libdrm.so.*|libdrm_amdgpu.so.*|libdrm_radeon.so.*) return 0 ;;
              libze_loader.so.*|libze_intel_gpu.so.*) return 0 ;;
              # X11/系统 GUI
              libX11.so.*|libxcb.so.*|libGL.so.*|libEGL.so.*|libGLX.so.*) return 0 ;;
            esac
            return 1
          }

          # 多轮迭代直到没新依赖
          ROUND=0
          while true; do
            ROUND=$((ROUND + 1))
            ADDED=0
            for f in "$ARTIFACTS_DIR"/*.so*; do
              [ -e "$f" ] || continue
              ldd "$f" 2>/dev/null | awk '/=>/ {print $3}' | while read -r dep; do
                [ -z "$dep" ] && continue
                [ ! -f "$dep" ] && continue
                base=$(basename "$dep")
                should_skip "$base" && continue
                if ! grep -qx "$base" "$SEEN"; then
                  cp "$dep" "$ARTIFACTS_DIR/" && \
                    echo "  [round $ROUND] +$base ($(stat -c %s "$dep") bytes)"
                  echo "$base" >> "$SEEN"
                fi
              done
            done
            CUR=$(wc -l < "$SEEN")
            [ "$CUR" -eq "${PREV:-0}" ] && break
            PREV=$CUR
          done

          echo ">>> Bundled $(ls "$ARTIFACTS_DIR"/*.so* 2>/dev/null | wc -l) shared libraries"
          BUNDLER_EOF
          )

          # 在合适的环境跑 BUNDLER (有 ldd + 全部依赖路径可见)
          if [ -n "${{ matrix.docker }}" ]; then
            # 容器内跑 (容器里有 SDK 完整路径)
            docker run --rm -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
              bash -c "$BUNDLER"
          elif [ "${{ matrix.ep }}" = "openvino" ]; then
            # OpenVINO 在 host 上跑 (LD_LIBRARY_PATH 加上 OV runtime)
            export LD_LIBRARY_PATH="/opt/intel/openvino_2024/runtime/lib/intel64:/opt/intel/openvino_2024/runtime/3rdparty/tbb/lib:${LD_LIBRARY_PATH:-}"
            # 也手动复制 plugins.xml + TBB (ldd 不会跟踪 dlopen 的 plugin)
            cp /opt/intel/openvino_2024/runtime/lib/intel64/plugins.xml artifacts/ 2>/dev/null || true
            cp /opt/intel/openvino_2024/runtime/lib/intel64/libopenvino_intel_*_plugin.so artifacts/ 2>/dev/null || true
            cp /opt/intel/openvino_2024/runtime/lib/intel64/libopenvino_*frontend.so artifacts/ 2>/dev/null || true
            cp /opt/intel/openvino_2024/runtime/3rdparty/tbb/lib/libtbb.so* artifacts/ 2>/dev/null || true
            cp /opt/intel/openvino_2024/runtime/3rdparty/tbb/lib/libtbbmalloc.so* artifacts/ 2>/dev/null || true
            ARTIFACTS_DIR="$(pwd)/artifacts"
            BUNDLER_LOCAL=$(echo "$BUNDLER" | sed "s|/work/artifacts|$ARTIFACTS_DIR|g")
            bash -c "$BUNDLER_LOCAL"
          else
            # arm64 cpu: host 上直接跑 (依赖只有系统 libstdc++/libc 之类,会被全部 skip)
            ARTIFACTS_DIR="$(pwd)/artifacts"
            BUNDLER_LOCAL=$(echo "$BUNDLER" | sed "s|/work/artifacts|$ARTIFACTS_DIR|g")
            bash -c "$BUNDLER_LOCAL"
          fi

          # GPU EP 必须把 plugin / 运行时插件单独捞出来 (dlopen 不走 ldd)
          if [ "${{ matrix.ep }}" = "cuda" ]; then
            # cuDNN 的所有子模块 (graph/cnn/adv/heuristic/engines_*) 都是 dlopen 的
            docker run --rm -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
              bash -c '
                for sub in libcudnn_graph libcudnn_cnn libcudnn_adv libcudnn_ops \
                           libcudnn_heuristic libcudnn_engines_precompiled libcudnn_engines_runtime_compiled; do
                  find /usr/local/cuda /usr/lib/x86_64-linux-gnu -name "${sub}.so*" 2>/dev/null \
                    | head -3 | xargs -I{} cp -n {} /work/artifacts/ 2>/dev/null || true
                done
                # 必要的 stub: cuda.so (driver stub for link, NOT for runtime!)
                # 不打包 libcuda.so, 客户端必须有 NVIDIA driver
              '
          fi
          if [ "${{ matrix.ep }}" = "rocm" ]; then
            docker run --rm -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
              bash -c '
                # ROCm 的 backend 也是 dlopen,把 backend lib 一并打包
                for lib in libamd_comgr.so libhipfft.so librocfft.so libroctx64.so \
                           librocm_smi64.so librocrand.so libhipsparse.so libhipblas.so; do
                  find /opt/rocm -name "${lib}*" 2>/dev/null | head -2 | xargs -I{} cp -n {} /work/artifacts/ 2>/dev/null || true
                done
              '
          fi

          # 自动扫描所有 artifact .so 的最高 GLIBC 依赖版本 (取联合上界)
          GLIBC_FLOOR=$(for f in artifacts/*.so*; do
              [ -f "$f" ] && objdump -T "$f" 2>/dev/null \
                | grep -oE "GLIBC_[0-9]+\.[0-9]+";
            done | sort -u | sort -t_ -k2 -V | tail -1 || echo "unknown")

          # 客户端硬性要求 (.so 不打包的部分) + 兼容 OS 列表
          if [ "${{ matrix.ep }}" = "cuda" ]; then
            CLIENT_REQUIRES="NVIDIA driver >= 525 (libcuda.so) — 不在 artifact 里"
            OS_COMPAT="Ubuntu 22.04+ / Kylin V10 SP3+ / 任何 glibc>=2.35 + NVIDIA driver"
          elif [ "${{ matrix.ep }}" = "rocm" ]; then
            CLIENT_REQUIRES="amdgpu kernel module + libdrm_amdgpu — 不在 artifact 里"
            OS_COMPAT="Ubuntu 22.04+ / 任何 glibc>=2.35 + amdgpu driver"
          elif [ "${{ matrix.ep }}" = "openvino" ]; then
            CLIENT_REQUIRES="(可选) Intel GPU 驱动 (i915/Xe kmod) 用于 GPU 推理"
            OS_COMPAT="Ubuntu 22.04+ / Kylin V10 SP3+ / 任何 glibc>=2.35"
          else
            CLIENT_REQUIRES="无 (CPU only,零外部依赖)"
            if [ "${{ matrix.arch }}" = "x64" ]; then
              OS_COMPAT="银河麒麟 V10 SP1+ x64 / 统信 UOS V20 / Anolis 8 / RHEL 8 / Ubuntu 20.04+ (任何 glibc>=2.28)"
            else
              OS_COMPAT="银河麒麟 V10 SP1+ aarch64 / 飞腾桌面 / 鲲鹏桌面 (任何 aarch64 glibc>=2.28)"
            fi
          fi

          cat > artifacts/version.txt <<EOF
          ORT Version:     $ORT_VERSION
          Platform:        Linux
          Arch:            ${{ matrix.arch }}
          EP:              ${{ matrix.ep }}
          glibc Floor:     $GLIBC_FLOOR
          OS Compatibility: $OS_COMPAT
          Container:       ${{ matrix.docker }}
          Runner:          ${{ matrix.runner }}
          Build Type:      ${{ inputs.build_type }}

          Bundled libs:    $(ls artifacts/*.so* 2>/dev/null | wc -l) files
          Total size:      $(du -sh artifacts/ | awk '{print $1}')
          Client requires: $CLIENT_REQUIRES
          EOF

          echo ">>> Final artifacts:"
          ls -lh artifacts/
          echo ">>> Total size:"
          du -sh artifacts/

      # ============================================================
      # 8. Smoke load test
      # ============================================================
      - name: Smoke load (Windows x64)
        if: matrix.platform == 'windows' && matrix.arch != 'arm64'
        shell: pwsh
        run: |
          $dll = "artifacts\onnxruntime.dll"
          python -c "import ctypes; lib = ctypes.CDLL(r'$dll'); fn = lib.OrtGetApiBase; fn.restype = ctypes.c_void_p; print('OrtGetApiBase =', hex(fn()))"

      - name: Smoke load (macOS / Linux native, non-container)
        if: (matrix.platform == 'macos') || (matrix.platform == 'linux' && matrix.docker == '')
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            FILE="artifacts/libonnxruntime.dylib"
          else
            FILE="artifacts/libonnxruntime.so"
          fi
          python3 -c "
          import ctypes, os, sys
          lib = ctypes.CDLL('$FILE')
          fn = lib.OrtGetApiBase; fn.restype = ctypes.c_void_p
          ptr = fn()
          assert ptr, 'OrtGetApiBase returned NULL'
          print(f'✅ OrtGetApiBase = {hex(ptr)}')
          "

      - name: Smoke load (Linux container)
        if: matrix.platform == 'linux' && matrix.docker != ''
        shell: bash
        run: |
          docker run --rm -v "$(pwd):/work" -w /work "${{ matrix.docker }}" \
            bash -c '
              # 容器里有 python 用容器的,没 python 用 ldd 兜底
              if command -v python3 >/dev/null 2>&1; then
                python3 -c "
          import ctypes
          lib = ctypes.CDLL(\"/work/artifacts/libonnxruntime.so\")
          fn = lib.OrtGetApiBase; fn.restype = ctypes.c_void_p
          assert fn(), \"OrtGetApiBase returned NULL\"
          print(\"✅ OrtGetApiBase loaded\")
          "
              else
                ldd /work/artifacts/libonnxruntime.so | head -20
                echo "✅ ldd shows libonnxruntime.so resolves"
              fi
            '

      # ============================================================
      # 9. Upload
      # ============================================================
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/
          retention-days: 90
