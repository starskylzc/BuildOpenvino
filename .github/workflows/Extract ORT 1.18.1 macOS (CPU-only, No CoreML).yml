name: "[DEPRECATED] Extract ORT 1.18.1 macOS (CPU-only, No CoreML)"

# ⚠️  此 workflow 已废弃，请使用：
#     "Build ORT 1.18.1 macOS (with CoreML EP).yml"
#
# 废弃原因：
#   1. 官方 NuGet 包 osx-x64 的 minos 实测为 11.0，不满足 macOS 10.15 的需求
#   2. 官方 NuGet 包 osx-arm64 本身就带 CoreML 依赖，无法做到 CPU-only
#   因此必须自行编译以精确控制 minos 和 EP 配置。
#
# 新方案：自行编译 ORT 1.18.1，两平台统一版本：
#   - osx-x64  : minos 10.15, with CoreML EP
#   - osx-arm64: minos 11.0,  with CoreML EP (固定 Xcode 15.2)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '此 workflow 已废弃。输入 yes 确认仍要运行（不推荐）'
        required: true
        default: 'no'

jobs:
  deprecated-warning:
    runs-on: ubuntu-latest
    steps:
      - name: Show deprecation notice
        run: |
          echo "::warning::此 workflow 已废弃！请使用 'Build ORT 1.18.1 macOS (with CoreML EP)' workflow。"
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "::error::未确认继续运行，已中止。请使用新 workflow。"
            exit 1
          fi
          echo "::warning::用户确认继续运行已废弃的 workflow，建议尽快迁移到新 workflow。"
