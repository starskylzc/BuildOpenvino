name: Extract OpenVINO (Final Minimal Release)-2023.3

# ============================================================
# 各平台使用的 OpenVINO 版本说明：
#
#   Windows / macOS : 2023.3.0  (官方 LTS，含 GPU 插件)
#
#   Linux x86_64    : 2023.3.0  ubuntu18 包（glibc 基准 2.27）
#   Linux aarch64   : 2023.3.0  ubuntu18 包（glibc 基准 2.27，包内自带 TBB）
#
# 选择 2023.3 ubuntu18 包的原因（兼容性优先）：
#
#   国产操作系统 glibc 版本实测：
#     银河麒麟 V10 SP1  : glibc 2.31（基于 Debian 11）
#     统信 UOS V20      : glibc 2.28（基于 Debian 10）  ← 最低基准
#     Ubuntu 20.04      : glibc 2.31
#
#   ubuntu20 包（glibc 2.31）：统信 UOS V20 (2.28) 无法运行 ❌
#   ubuntu18 包（glibc 2.27）：所有上述系统均可运行 ✅
#
#   2023.3 ubuntu18 x86_64 包含 GPU 插件（libopenvino_intel_gpu_plugin.so）✅
#   2023.3 ubuntu18 aarch64 无 GPU 插件（ARM 平台所有版本均无 Intel GPU 插件）
#   aarch64 包内自带 TBB（3rdparty/tbb/lib/libtbb.so.12.2）
#   x86_64 包无内置 TBB，需从系统 libtbb2 获取（libtbb.so.2）
# ============================================================

on:
  workflow_dispatch:
    inputs:
      # ── Windows ────────────────────────────────────────────
      build_windows_gpu:
        description: "Windows x64 GPU"
        type: boolean
        default: true
      build_windows_cpu:
        description: "Windows x64 CPU"
        type: boolean
        default: true
      # ── macOS ──────────────────────────────────────────────
      build_mac_cpu:
        description: "macOS x86_64 CPU"
        type: boolean
        default: true
      # ── Linux x86_64 ───────────────────────────────────────
      build_linux_x86_64_cpu:
        description: "Linux x86_64 CPU (glibc 2.27, 兼容麒麟/统信/Ubuntu 20.04)"
        type: boolean
        default: true
      build_linux_x86_64_gpu:
        description: "Linux x86_64 GPU (glibc 2.27, 兼容麒麟/统信/Ubuntu 20.04)"
        type: boolean
        default: true
      # ── Linux aarch64 ──────────────────────────────────────
      build_linux_aarch64_cpu:
        description: "Linux aarch64 CPU (glibc 2.27, 兼容麒麟/统信 ARM)"
        type: boolean
        default: true
      # 注：aarch64 官方预编译包所有版本均不含 Intel GPU 插件（ARM 平台限制）

env:
  # 全平台统一使用 2023.3.0
  OV_VERSION: "2023.3.0"
  OV_WIN_URL: "https://storage.openvinotoolkit.org/repositories/openvino/packages/2023.3/windows/w_openvino_toolkit_windows_2023.3.0.13775.ceeafaf64f3_x86_64.zip"
  OV_MAC_URL: "https://storage.openvinotoolkit.org/repositories/openvino/packages/2023.3/macos/m_openvino_toolkit_macos_10_15_2023.3.0.13775.ceeafaf64f3_x86_64.tgz"
  # Linux 使用 ubuntu18 包（glibc 2.27），兼容统信 UOS V20 (2.28) 及以上所有系统
  OV_LINUX_X64_URL: "https://storage.openvinotoolkit.org/repositories/openvino/packages/2023.3/linux/l_openvino_toolkit_ubuntu18_2023.3.0.13775.ceeafaf64f3_x86_64.tgz"
  OV_LINUX_ARM_URL: "https://storage.openvinotoolkit.org/repositories/openvino/packages/2023.3/linux/l_openvino_toolkit_ubuntu18_2023.3.0.13775.ceeafaf64f3_arm64.tgz"

jobs:
  # ============================================================
  # Job 1: Windows + macOS 构建（在 macos-latest 上运行）
  # 只要 Windows/Mac 中任意一项被勾选就运行此 job
  # ============================================================
  build-windows-mac:
    if: ${{ inputs.build_windows_gpu || inputs.build_windows_cpu || inputs.build_mac_cpu }}
    runs-on: macos-latest
    steps:
      - name: Download Official Packages
        run: |
          set -euxo pipefail
          mkdir -p downloads
          NEED_WIN="${{ inputs.build_windows_gpu || inputs.build_windows_cpu }}"
          NEED_MAC="${{ inputs.build_mac_cpu }}"
          if [ "$NEED_WIN" = "true" ]; then
            echo ">>> Downloading Windows Package (OpenVINO ${{ env.OV_VERSION }})..."
            curl -L -o downloads/win.zip "${{ env.OV_WIN_URL }}"
          fi
          if [ "$NEED_MAC" = "true" ]; then
            echo ">>> Downloading Mac Package (OpenVINO ${{ env.OV_VERSION }})..."
            curl -L -o downloads/mac.tgz "${{ env.OV_MAC_URL }}"
          fi

      - name: Extract Archives
        run: |
          set -euxo pipefail
          NEED_WIN="${{ inputs.build_windows_gpu || inputs.build_windows_cpu }}"
          NEED_MAC="${{ inputs.build_mac_cpu }}"
          if [ "$NEED_WIN" = "true" ]; then
            echo ">>> Extracting Windows..."
            unzip -q downloads/win.zip -d extracted_win
            WIN_ROOT=$(find extracted_win -maxdepth 1 -type d -name "w_openvino*" | head -n 1)
            echo "WIN_ROOT=$WIN_ROOT" >> $GITHUB_ENV
          fi
          if [ "$NEED_MAC" = "true" ]; then
            echo ">>> Extracting Mac..."
            mkdir -p extracted_mac
            tar -xzf downloads/mac.tgz -C extracted_mac
            MAC_ROOT=$(find extracted_mac -maxdepth 1 -type d -name "m_openvino*" | head -n 1)
            echo "MAC_ROOT=$MAC_ROOT" >> $GITHUB_ENV
          fi

      # --- Windows GPU ---
      - name: Process Windows Runtime (GPU)
        if: ${{ inputs.build_windows_gpu }}
        run: |
          set -euxo pipefail
          mkdir -p final_output/windows_gpu
          SRC_BIN="$WIN_ROOT/runtime/bin/intel64/Release"
          SRC_TBB="$WIN_ROOT/runtime/3rdparty/tbb/bin"
          SRC_INC="$WIN_ROOT/runtime/include/ie/c_api"
          DST="final_output/windows_gpu"
          echo ">>> Copying Windows Libraries (GPU)..."
          cp "$SRC_BIN/openvino.dll"                  "$DST/"
          cp "$SRC_BIN/openvino_c.dll"                "$DST/"
          cp "$SRC_BIN/openvino_onnx_frontend.dll"    "$DST/"
          cp "$SRC_BIN/openvino_intel_gpu_plugin.dll" "$DST/"
          [ -f "$SRC_BIN/cache.json" ] && cp "$SRC_BIN/cache.json" "$DST/"
          cp "$SRC_TBB/tbb12.dll"     "$DST/"
          cp "$SRC_TBB/tbbmalloc.dll" "$DST/"
          mkdir -p "$DST/include"
          cp "$SRC_INC/ie_c_api.h" "$DST/include/"
          printf '<ie>\n    <plugins>\n        <plugin name="GPU" location="openvino_intel_gpu_plugin.dll">\n        </plugin>\n    </plugins>\n</ie>\n' \
            > "$DST/plugins.xml"

      # --- Windows CPU ---
      - name: Process Windows Runtime (CPU)
        if: ${{ inputs.build_windows_cpu }}
        run: |
          set -euxo pipefail
          mkdir -p final_output/windows_cpu
          SRC_BIN="$WIN_ROOT/runtime/bin/intel64/Release"
          SRC_TBB="$WIN_ROOT/runtime/3rdparty/tbb/bin"
          SRC_INC="$WIN_ROOT/runtime/include/ie/c_api"
          DST="final_output/windows_cpu"
          echo ">>> Copying Windows Libraries (CPU)..."
          cp "$SRC_BIN/openvino.dll"               "$DST/"
          cp "$SRC_BIN/openvino_c.dll"             "$DST/"
          cp "$SRC_BIN/openvino_onnx_frontend.dll" "$DST/"
          CPU_PLUGIN="$SRC_BIN/openvino_intel_cpu_plugin.dll"
          if [[ ! -f "$CPU_PLUGIN" ]]; then
            CPU_PLUGIN=$(find "$SRC_BIN" -maxdepth 1 -type f -name "openvino_intel_cpu_plugin*.dll" | head -n 1 || true)
          fi
          if [[ -z "${CPU_PLUGIN:-}" || ! -f "$CPU_PLUGIN" ]]; then
            echo "ERROR: Windows CPU plugin not found in $SRC_BIN"
            ls -la "$SRC_BIN"; exit 1
          fi
          cp "$CPU_PLUGIN" "$DST/"
          CPU_PLUGIN_NAME=$(basename "$CPU_PLUGIN")
          [ -f "$SRC_BIN/cache.json" ] && cp "$SRC_BIN/cache.json" "$DST/"
          cp "$SRC_TBB/tbb12.dll"     "$DST/"
          cp "$SRC_TBB/tbbmalloc.dll" "$DST/"
          mkdir -p "$DST/include"
          cp "$SRC_INC/ie_c_api.h" "$DST/include/"
          printf '<ie>\n    <plugins>\n        <plugin name="CPU" location="%s">\n        </plugin>\n    </plugins>\n</ie>\n' \
            "$CPU_PLUGIN_NAME" > "$DST/plugins.xml"

      # --- macOS CPU ---
      - name: Process Mac Runtime (CPU + ONNX)
        if: ${{ inputs.build_mac_cpu }}
        run: |
          set -euxo pipefail
          mkdir -p final_output/mac
          SRC_LIB="$MAC_ROOT/runtime/lib/intel64/Release"
          SRC_TBB="$MAC_ROOT/runtime/3rdparty/tbb/lib"
          SRC_INC="$MAC_ROOT/runtime/include/ie/c_api"
          DST="final_output/mac"
          echo ">>> Copying Mac Libraries (REAL files only)..."
          cp "$SRC_LIB/libopenvino.2023.3.0.dylib"               "$DST/"
          cp "$SRC_LIB/libopenvino_c.2023.3.0.dylib"             "$DST/"
          cp "$SRC_LIB/libopenvino_onnx_frontend.2023.3.0.dylib" "$DST/"
          CPU_PLUGIN=$(find "$SRC_LIB" -maxdepth 1 -type f \
            \( -name "libopenvino_intel_cpu_plugin*.so" -o -name "libopenvino_intel_cpu_plugin*.dylib" \) \
            | head -n 1)
          if [[ -z "$CPU_PLUGIN" ]]; then
            echo "ERROR: CPU plugin not found in $SRC_LIB"; ls -la "$SRC_LIB"; exit 1
          fi
          cp "$CPU_PLUGIN" "$DST/"
          CPU_PLUGIN_NAME=$(basename "$CPU_PLUGIN")
          cp "$SRC_TBB/libtbb.12.dylib"      "$DST/"
          cp "$SRC_TBB/libtbbmalloc.2.dylib" "$DST/"
          mkdir -p "$DST/include"
          cp "$SRC_INC/ie_c_api.h" "$DST/include/"
          cd "$DST"
          mv -f "libopenvino.2023.3.0.dylib"               "libopenvino.dylib"
          mv -f "libopenvino_c.2023.3.0.dylib"             "libopenvino_c.dylib"
          mv -f "libopenvino_onnx_frontend.2023.3.0.dylib" "libopenvino_onnx_frontend.2330.dylib"
          rm -f "libopenvino_onnx_frontend.dylib" || true
          printf '<ie>\n    <plugins>\n        <plugin name="CPU" location="%s">\n        </plugin>\n    </plugins>\n</ie>\n' \
            "$CPU_PLUGIN_NAME" > "plugins.xml"
          echo ">>> Pre-Verify files:"
          ls -la libopenvino*.dylib libtbb*.dylib "$CPU_PLUGIN_NAME" plugins.xml
          echo ">>> Patching Mac binaries for local execution (@loader_path)..."
          LIBS=$(ls *.dylib *.so 2>/dev/null || true)
          for LIB in $LIBS; do
            chmod +w "$LIB" || true
            install_name_tool -id "@loader_path/$LIB" "$LIB" || true
          done
          for LIB in $LIBS; do
            echo "---- patch deps for: $LIB ----"
            DEPS=$(otool -L "$LIB" | tail -n +2 | awk '{print $1}' \
              | grep -v "^/usr/lib/" | grep -v "^/System/" || true)
            for DEP_PATH in $DEPS; do
              DEP_NAME=$(basename "$DEP_PATH")
              if [[ "$DEP_NAME" == "libopenvino.2330.dylib" || "$DEP_NAME" == "libopenvino.2023.3.0.dylib" ]]; then
                install_name_tool -change "$DEP_PATH" "@loader_path/libopenvino.dylib" "$LIB" || true; continue
              fi
              if [[ "$DEP_NAME" == "libopenvino_c.2330.dylib" || "$DEP_NAME" == "libopenvino_c.2023.3.0.dylib" ]]; then
                install_name_tool -change "$DEP_PATH" "@loader_path/libopenvino_c.dylib" "$LIB" || true; continue
              fi
              if [[ "$DEP_NAME" == "libopenvino_onnx_frontend.dylib" || \
                    "$DEP_NAME" == "libopenvino_onnx_frontend.2023.3.0.dylib" || \
                    "$DEP_NAME" == "libopenvino_onnx_frontend.2330.dylib" ]]; then
                install_name_tool -change "$DEP_PATH" "@loader_path/libopenvino_onnx_frontend.2330.dylib" "$LIB" || true; continue
              fi
              if [[ -f "$DEP_NAME" ]]; then
                install_name_tool -change "$DEP_PATH" "@loader_path/$DEP_NAME" "$LIB" || true
              fi
            done
          done
          echo ">>> Verify deps:"
          otool -L libopenvino.dylib || true
          otool -L libopenvino_onnx_frontend.2330.dylib || true
          otool -L "$CPU_PLUGIN_NAME" || true
          cd ../..

      - name: Zip Windows and Mac
        run: |
          set -euxo pipefail
          cd final_output
          DIRS=""
          [ -d windows_gpu ] && DIRS="$DIRS windows_gpu"
          [ -d windows_cpu ] && DIRS="$DIRS windows_cpu"
          [ -d mac ]         && DIRS="$DIRS mac"
          zip -r openvino_windows_mac.zip $DIRS
          echo ">>> Package Contents:"
          unzip -l openvino_windows_mac.zip

      - name: Upload Windows and Mac Artifact
        uses: actions/upload-artifact@v7
        with:
          name: openvino_windows_mac
          path: final_output/openvino_windows_mac.zip

  # ============================================================
  # Job 2: Linux x86_64 (CPU + GPU)
  # Runner：ubuntu-22.04
  # Docker 容器：ubuntu:20.04 (glibc 2.31)
  # OpenVINO：2023.3.0 ubuntu18 x86_64（glibc 基准 2.27）
  # 兼容：Ubuntu 20.04+，麒麟 V10 x64，统信 UOS V20 x64（glibc ≥ 2.27）
  # ============================================================
  build-linux-x86_64:
    if: ${{ inputs.build_linux_x86_64_cpu || inputs.build_linux_x86_64_gpu }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Extract OpenVINO x86_64 CPU (Docker ubuntu:20.04)
        if: ${{ inputs.build_linux_x86_64_cpu }}
        run: |
          mkdir -p "${{ github.workspace }}/final_output"
          docker run --rm \
            -v "${{ github.workspace }}/.github/scripts/extract_openvino_linux.sh:/extract_ov.sh:ro" \
            -v "${{ github.workspace }}/final_output:/out" \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash /extract_ov.sh \
              "${{ env.OV_LINUX_X64_URL }}" \
              "/out/linux_x86_64_cpu" \
              "cpu" \
              "${{ env.OV_VERSION }}"

      - name: Extract OpenVINO x86_64 GPU (Docker ubuntu:20.04)
        if: ${{ inputs.build_linux_x86_64_gpu }}
        run: |
          mkdir -p "${{ github.workspace }}/final_output"
          docker run --rm \
            -v "${{ github.workspace }}/.github/scripts/extract_openvino_linux.sh:/extract_ov.sh:ro" \
            -v "${{ github.workspace }}/final_output:/out" \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash /extract_ov.sh \
              "${{ env.OV_LINUX_X64_URL }}" \
              "/out/linux_x86_64_gpu" \
              "gpu" \
              "${{ env.OV_VERSION }}"

      - name: Zip Linux x86_64
        run: |
          set -euxo pipefail
          cd "${{ github.workspace }}/final_output"
          DIRS=""
          [ -d linux_x86_64_cpu ] && DIRS="$DIRS linux_x86_64_cpu"
          [ -d linux_x86_64_gpu ] && DIRS="$DIRS linux_x86_64_gpu"
          zip -r openvino_linux_x86_64.zip $DIRS
          echo ">>> Package Contents:"
          unzip -l openvino_linux_x86_64.zip

      - name: Upload Linux x86_64 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: openvino_linux_x86_64
          path: ${{ github.workspace }}/final_output/openvino_linux_x86_64.zip

  # ============================================================
  # Job 3: Linux aarch64 (CPU only)
  # Runner：ubuntu-24.04-arm（GitHub 原生 ARM64 Runner）
  # Docker 容器：ubuntu:20.04 (glibc 2.31)
  # OpenVINO：2023.3.0 ubuntu18 aarch64（glibc 基准 2.27，包内自带 TBB）
  # 兼容：麒麟 V10 ARM、统信 UOS V20 ARM、鸿蒙 OpenHarmony（glibc ≥ 2.27）
  # 注：官方预编译包所有版本均不含 Intel GPU 插件（ARM 平台限制）
  # ============================================================
  build-linux-aarch64:
    if: ${{ inputs.build_linux_aarch64_cpu }}
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Extract OpenVINO aarch64 CPU (Docker ubuntu:20.04)
        run: |
          mkdir -p "${{ github.workspace }}/final_output"
          docker run --rm \
            -v "${{ github.workspace }}/.github/scripts/extract_openvino_linux.sh:/extract_ov.sh:ro" \
            -v "${{ github.workspace }}/final_output:/out" \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:20.04 \
            bash /extract_ov.sh \
              "${{ env.OV_LINUX_ARM_URL }}" \
              "/out/linux_aarch64_cpu" \
              "cpu" \
              "${{ env.OV_VERSION }}"

      - name: Zip Linux aarch64
        run: |
          set -euxo pipefail
          cd "${{ github.workspace }}/final_output"
          zip -r openvino_linux_aarch64.zip linux_aarch64_cpu
          echo ">>> Package Contents:"
          unzip -l openvino_linux_aarch64.zip

      - name: Upload Linux aarch64 Artifact
        uses: actions/upload-artifact@v7
        with:
          name: openvino_linux_aarch64
          path: ${{ github.workspace }}/final_output/openvino_linux_aarch64.zip

  # ============================================================
  # Job 4: 合并所有产物（在 ubuntu-22.04 上运行）
  # 依赖前三个 job，各 job 可能因未勾选而跳过，
  # 使用 always() 确保只要有产物就执行合并
  # ============================================================
  merge-and-release:
    needs: [build-windows-mac, build-linux-x86_64, build-linux-aarch64]
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-22.04
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare Output Directory
        run: |
          set -euxo pipefail
          mkdir -p final_output
          if [ -f "artifacts/openvino_windows_mac/openvino_windows_mac.zip" ]; then
            echo ">>> Extracting Windows + Mac..."
            unzip -q artifacts/openvino_windows_mac/openvino_windows_mac.zip -d final_output/
          fi
          if [ -f "artifacts/openvino_linux_x86_64/openvino_linux_x86_64.zip" ]; then
            echo ">>> Extracting Linux x86_64..."
            unzip -q artifacts/openvino_linux_x86_64/openvino_linux_x86_64.zip -d final_output/
          fi
          if [ -f "artifacts/openvino_linux_aarch64/openvino_linux_aarch64.zip" ]; then
            echo ">>> Extracting Linux aarch64..."
            unzip -q artifacts/openvino_linux_aarch64/openvino_linux_aarch64.zip -d final_output/
          fi
          echo ">>> Final Output Structure:"
          find final_output/ -type f -o -type l | sort

      - name: Create Final Package
        run: |
          set -euxo pipefail
          cd final_output
          zip -r openvino_final_minimal.zip .
          echo ">>> Final Package Contents:"
          unzip -l openvino_final_minimal.zip

      - name: Upload Final Artifact
        uses: actions/upload-artifact@v7
        with:
          name: openvino_runtime_final
          path: final_output/openvino_final_minimal.zip
