name: Stage Deploy

# 目的:
#   接收已 ✅ 的 Verify run id,从该 run 的 7 个 deploy-<platform> artifact 汇总
#   成单个 deploy-1.25.0-<sha> bundle (deploy/<7 平台>/ 目录树),供客户一键下载。
#
#   独立工作流的好处:
#     - 不必为每次 Verify 都跑 stage (单平台 trigger 时不需要 bundle)
#     - 可复用任意历史 Verify run (verify_run_id 显式传入,客户机失败重试不需重新 verify)
#     - download_deploy.sh 优先认这个工作流的 artifact
#
# 用法:
#   gh workflow run "Stage Deploy" -f verify_run_id=<verify_run_id>

on:
  workflow_dispatch:
    inputs:
      verify_run_id:
        description: 'Verify Built Artifacts run id (必须 7 平台全 ✅)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ORT_VERSION: "1.25.0"

jobs:
  stage:
    name: stage-deploy
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Validate verify run is ✅
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VRID="${{ inputs.verify_run_id }}"
          STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/$VRID" \
                    --jq '.status + "/" + (.conclusion // "null")')
          echo "Verify run $VRID: $STATUS"
          if [ "$STATUS" != "completed/success" ]; then
            echo "::error::Verify run $VRID 未成功 ($STATUS),无法 stage"
            exit 1
          fi

      - name: Download all 7 deploy-<platform> artifacts from verify run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VRID="${{ inputs.verify_run_id }}"
          mkdir -p staging
          for plat in win-x64-dml win-x86-cpu win-arm64-dml mac-x64-coreml mac-arm64-coreml linux-x64 linux-aarch64; do
            echo ">>> Pulling deploy-$plat from verify run $VRID"
            gh run download "$VRID" -R "${{ github.repository }}" \
              -n "deploy-$plat" -D "staging/$plat"
            ls -la "staging/$plat" | head -10
          done

      - name: Assemble deploy/ tree (rename to clean platform names)
        shell: bash
        run: |
          mkdir -p deploy
          mv staging/win-x64-dml       deploy/win-x64
          mv staging/win-x86-cpu       deploy/win-x86
          mv staging/win-arm64-dml     deploy/win-arm64
          mv staging/mac-x64-coreml    deploy/osx-x64
          mv staging/mac-arm64-coreml  deploy/osx-arm64
          mv staging/linux-x64         deploy/linux-x64
          mv staging/linux-aarch64     deploy/linux-aarch64
          echo ">>> 完整 deploy/ tree:"
          find deploy -type f | sort
          echo ""
          du -sh deploy/*

      - name: Generate deploy/README.md (客户部署说明)
        shell: bash
        run: |
          cat > deploy/README.md <<'EOF'
          # Native Runtime Bundle (ORT 1.25.0 + OpenCvSharp 4.10.0)

          7 个平台,选对应你客户机 OS 的 SKU 直接 ship 整个目录即可。

          | 平台目录 | 客户机 OS | 加速 |
          |---|---|---|
          | `win-x64/` | Windows 10/11 x64 | DirectML 自动 (NVIDIA/AMD/Intel iGPU) |
          | `win-x86/` | Windows 10/11 32-bit | CPU only |
          | `win-arm64/` | Windows 11 ARM64 | DirectML |
          | `osx-x64/` | macOS 10.15+ Intel | CoreML |
          | `osx-arm64/` | macOS 11.0+ Apple Silicon | CoreML + ANE |
          | `linux-x64/` | Linux x86_64 (glibc 2.27+) | CPU / CUDA12 (含 cuDNN9 runtime) |
          | `linux-aarch64/` | Linux ARM64 (glibc 2.27+) | CPU only |

          客户端 C# 代码用 `NativeLibrary.SetDllImportResolver` 强制从 app 目录加载
          (参考 `tests/CSharpVerify/Program.cs`)。

          信创 OS 兼容: 麒麟 V10 / UOS V20 / openEuler / RHEL 8+ (glibc 2.27 floor)。
          EOF

      - name: Upload final deploy bundle
        uses: actions/upload-artifact@v7
        with:
          name: deploy-${{ env.ORT_VERSION }}-${{ inputs.verify_run_id }}
          path: deploy/
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        shell: bash
        run: |
          echo "## ✅ Stage Deploy 完成 (来源 verify run ${{ inputs.verify_run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "本地下载:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "cd artifacts/ && ./download_deploy.sh" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
