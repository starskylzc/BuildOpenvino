# ============================================================
# Build-Opencvsharp-AllPlatforms-4.10.0
#
# 统一跨平台构建 workflow：OpenCvSharpExtern 4.10.0
#
# 支持的构建目标：
#   macOS  │ x86_64 (Intel, macOS 10.15+)
#          │ arm64  (Apple Silicon, macOS 11.0+)
#   ───────┼──────────────────────────────────────────────────
#   Windows│ x64   (amd64)
#          │ x86   (32-bit)
#          │ arm64 (原生 ARM64 Runner)
#   ───────┼──────────────────────────────────────────────────
  #   Linux  │ x86_64  (Docker ubuntu:18.04 / glibc 2.27)
  #          │ aarch64 (Docker arm64v8/ubuntu:18.04 / glibc 2.27)
  #          │   兼容：统信 UOS V20 (glibc 2.28+)、麒麟 V10 (glibc 2.31)、
  #          │         Ubuntu 18.04+、鸿蒙 OpenHarmony
#
# 使用方式：
#   在 GitHub Actions 页面手动触发（workflow_dispatch），
#   勾选需要构建的平台，未勾选的平台将被跳过。
# ============================================================

name: Build-Opencvsharp-AllPlatforms-4.10.0

on:
  workflow_dispatch:
    inputs:
      # ── macOS ──────────────────────────────────────────────
      build_macos_x64:
        description: "macOS x86_64 (Intel, 10.15+)"
        type: boolean
        default: true
      build_macos_arm64:
        description: "macOS arm64 (Apple Silicon, 11.0+)"
        type: boolean
        default: true
      # ── Windows ────────────────────────────────────────────
      build_windows_x64:
        description: "Windows x64"
        type: boolean
        default: true
      build_windows_x86:
        description: "Windows x86 (32-bit)"
        type: boolean
        default: true
      build_windows_arm64:
        description: "Windows arm64"
        type: boolean
        default: true
      # ── Linux ──────────────────────────────────────────────
      build_linux_x86_64:
        description: "Linux x86_64 (glibc 2.27, 兼容统信UOS/麒麟 x64)"
        type: boolean
        default: true
      build_linux_aarch64:
        description: "Linux aarch64 (glibc 2.27, 兼容统信UOS/麒麟 ARM)"
        type: boolean
        default: true

env:
  OPENCV_VERSION: "4.10.0"
  OPENCVSHARP_REF: "4.10.0.20241108"
  BUILD_LIST: "core,imgproc,videoio"

jobs:
  # ============================================================
  # macOS x86_64 (Intel)
  # ============================================================
  build_macos_x64:
    if: ${{ inputs.build_macos_x64 }}
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja

      - name: Build x86_64 slice (macOS 10.15)
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x .github/scripts/build_macos_slice.sh
          OPENCV_VERSION=${{ env.OPENCV_VERSION }} \
          OPENCVSHARP_REF=${{ env.OPENCVSHARP_REF }} \
          BUILD_LIST=${{ env.BUILD_LIST }} \
            .github/scripts/build_macos_slice.sh x86_64 10.15

      - name: Smoke test (macOS x86_64)
        shell: bash
        run: |
          LIB=_work/out-x86_64/final/libOpenCvSharpExtern.dylib
          echo "── 文件信息 ──────────────────────────────────────"
          lipo -info "$LIB"
          otool -L   "$LIB"
          echo "── 冒烟测试 ──────────────────────────────────────"
          python3 .github/scripts/smoke_test_unix.py "$LIB"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osx-x64-slice
          path: _work/out-x86_64/final/libOpenCvSharpExtern.dylib

  # ============================================================
  # macOS arm64 (Apple Silicon)
  # ============================================================
  build_macos_arm64:
    if: ${{ inputs.build_macos_arm64 }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja

      - name: Build arm64 slice (macOS 11.0)
        shell: bash
        run: |
          set -euxo pipefail
          chmod +x .github/scripts/build_macos_slice.sh
          OPENCV_VERSION=${{ env.OPENCV_VERSION }} \
          OPENCVSHARP_REF=${{ env.OPENCVSHARP_REF }} \
          BUILD_LIST=${{ env.BUILD_LIST }} \
            .github/scripts/build_macos_slice.sh arm64 11.0

      - name: Smoke test (macOS arm64)
        shell: bash
        run: |
          LIB=_work/out-arm64/final/libOpenCvSharpExtern.dylib
          echo "── 文件信息 ──────────────────────────────────────"
          lipo -info "$LIB"
          otool -L   "$LIB"
          echo "── 冒烟测试 ──────────────────────────────────────"
          python3 .github/scripts/smoke_test_unix.py "$LIB"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: osx-arm64-slice
          path: _work/out-arm64/final/libOpenCvSharpExtern.dylib

  # ============================================================
  # Windows 矩阵（x64 / x86 / arm64）
  # 每个目标通过独立的 if 条件控制是否跳过
  # ============================================================
  build_windows_matrix:
    # 只要三个 Windows 目标中有任意一个被勾选就运行此 job
    if: ${{ inputs.build_windows_x64 || inputs.build_windows_x86 || inputs.build_windows_arm64 }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x64
            arch: x64
            os: windows-latest
            enabled_input: build_windows_x64

          - target: x86
            arch: x86
            os: windows-latest
            enabled_input: build_windows_x86

          - target: arm64
            arch: arm64
            os: windows-11-arm
            enabled_input: build_windows_arm64

    steps:
      # 通过 inputs context 动态判断当前矩阵项是否被勾选
      - name: Check if this target is enabled
        id: check
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          case "$TARGET" in
            x64)   ENABLED="${{ inputs.build_windows_x64 }}" ;;
            x86)   ENABLED="${{ inputs.build_windows_x86 }}" ;;
            arm64) ENABLED="${{ inputs.build_windows_arm64 }}" ;;
            *)     ENABLED="false" ;;
          esac
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        if: steps.check.outputs.enabled == 'true'

      - uses: ilammy/msvc-dev-cmd@v1
        if: steps.check.outputs.enabled == 'true'
        with:
          arch: ${{ matrix.arch }}

      - name: Install tools (cmake/ninja)
        if: steps.check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          choco install -y ninja cmake
          cmake --version
          ninja --version
          python --version

      - name: Build OpenCvSharpExtern (${{ matrix.target }})
        if: steps.check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $env:OPENCV_VERSION    = "${{ env.OPENCV_VERSION }}"
          $env:OPENCVSHARP_REF   = "${{ env.OPENCVSHARP_REF }}"
          $env:BUILD_LIST        = "${{ env.BUILD_LIST }}"
          pwsh -File .github/scripts/build_opencv_windows.ps1 -TargetArch ${{ matrix.target }}

      - name: Smoke test (Windows ${{ matrix.target }})
        if: steps.check.outputs.enabled == 'true'
        shell: pwsh
        run: |
          pwsh -File .github/scripts/smoke_test_windows.ps1 `
            -LibPath "_work/out-win-${{ matrix.target }}/final/OpenCvSharpExtern.dll" `
            -Arch "${{ matrix.target }}"

      - name: Upload artifact (${{ matrix.target }})
        if: steps.check.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: win-${{ matrix.target }}
          path: _work/out-win-${{ matrix.target }}/final/OpenCvSharpExtern.dll

      - name: Skip notice
        if: steps.check.outputs.enabled != 'true'
        shell: bash
        run: echo "Skipped windows-${{ matrix.target }} (not selected)"

  # ============================================================
  # Linux x86_64
  # Docker 容器：ubuntu:18.04 (glibc 2.27)
  # 兼容：统信 UOS V20 x64 (glibc 2.28)、麒麟 V10 x64 (glibc 2.31)、Ubuntu 18.04+
  # ============================================================
  build_linux_x86_64:
    if: ${{ inputs.build_linux_x86_64 }}
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Build x86_64 slice (Docker ubuntu:18.04 / glibc 2.27)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/ws" \
            -w /ws \
            -e DEBIAN_FRONTEND=noninteractive \
            -e TZ=UTC \
            -e OPENCV_VERSION=${{ env.OPENCV_VERSION }} \
            -e OPENCVSHARP_REF=${{ env.OPENCVSHARP_REF }} \
            -e BUILD_LIST=${{ env.BUILD_LIST }} \
            ubuntu:18.04 \
            bash .github/scripts/build_linux_slice.sh x86_64

      - name: Smoke test (Linux x86_64)
        run: |
          LIB=_work/out-x86_64/final/libOpenCvSharpExtern.so
          echo "── 文件信息 ──────────────────────────────────────"
          file "$LIB"
          ldd  "$LIB"
          echo "── 冒烟测试 ──────────────────────────────────────"
          python3 .github/scripts/smoke_test_unix.py "$LIB"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: _work/out-x86_64/final/libOpenCvSharpExtern.so

  # ============================================================
  # Linux aarch64
  # Runner：ubuntu-24.04-arm（GitHub 原生 ARM64 Runner）
  # Docker 容器：arm64v8/ubuntu:18.04 (glibc 2.27)
  # 兼容：统信 UOS V20 ARM (glibc 2.28)、麒麟 V10 ARM (glibc 2.31)、鸿蒙 OpenHarmony
  # ============================================================
  build_linux_aarch64:
    if: ${{ inputs.build_linux_aarch64 }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Build aarch64 slice (Docker arm64v8/ubuntu:18.04 / glibc 2.27)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/ws" \
            -w /ws \
            -e DEBIAN_FRONTEND=noninteractive \
            -e TZ=UTC \
            -e OPENCV_VERSION=${{ env.OPENCV_VERSION }} \
            -e OPENCVSHARP_REF=${{ env.OPENCVSHARP_REF }} \
            -e BUILD_LIST=${{ env.BUILD_LIST }} \
            arm64v8/ubuntu:18.04 \
            bash .github/scripts/build_linux_slice.sh aarch64

      - name: Smoke test (Linux aarch64)
        run: |
          LIB=_work/out-aarch64/final/libOpenCvSharpExtern.so
          echo "── 文件信息 ──────────────────────────────────────"
          file "$LIB"
          ldd  "$LIB"
          echo "── 冒烟测试 ──────────────────────────────────────"
          python3 .github/scripts/smoke_test_unix.py "$LIB"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-aarch64
          path: _work/out-aarch64/final/libOpenCvSharpExtern.so
